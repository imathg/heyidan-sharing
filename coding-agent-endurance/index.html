<script>
const md = "# Coding Agent \u7684\u7eed\u822a\u529b\u5dee\u5f02 \u2014 Claude Code \u4e0e Codex \u7684\u6e90\u7801\u7ea7\u5bf9\u6bd4\u5206\u6790\n\n> \u57fa\u4e8e Claude Code 2.1.88 \u4e0e Codex CLI (codex-rs) \u7684\u6e90\u7801\u9605\u8bfb\uff0c\u5206\u6790\u540c\u7c7b Coding Agent \u5728\u4e0a\u4e0b\u6587\u7ba1\u7406\u3001\u6267\u884c\u7eed\u822a\u548c\u7528\u6237\u4ea4\u4e92\u6a21\u578b\u4e0a\u7684\u8bbe\u8ba1\u5206\u6b67\u3002\n\n\n---\n\n## \u4e00\u3001\u540c\u4e00\u4e2a\u4efb\u52a1\uff0c3 \u5206\u949f vs 5 \u5c0f\u65f6\n\n\u4f60\u8ba9 Codex \u8dd1\u4e00\u4e2a\u6279\u91cf\u6570\u636e\u5904\u7406\u4efb\u52a1\uff0c\u53d1\u5b8c\u6307\u4ee4\u53bb\u5403\u996d\uff0c\u56de\u6765\u65f6\u4efb\u52a1\u5df2\u7ecf\u8dd1\u4e86 4.8 \u5c0f\u65f6\u3001393 \u6b65\uff0c\u7ed3\u679c\u5199\u597d\u4e86\u3002Claude Code \u8dd1\u7c7b\u4f3c\u7684\u6279\u91cf\u4efb\u52a1\u65f6\uff0c\u524d\u53f0 agent \u901a\u5e38\u5728\u51e0\u5206\u949f\u5185\u6682\u505c\u7b49\u5f85\u786e\u8ba4\uff0c\u9700\u8981\u901a\u8fc7\u540e\u53f0 agent \u624d\u80fd\u5b9e\u73b0\u957f\u7a0b\u65e0\u4eba\u503c\u5b88\u3002**\u540c\u6837\u662f Coding Agent\uff0c\u7eed\u822a\u529b\u4e3a\u4ec0\u4e48\u5dee\u8fd9\u4e48\u591a\uff1f** \u5177\u4f53\u8868\u73b0\u4e3a\u4e09\u4e2a\u65b9\u9762\uff1a\n\n1. **\u5355 turn \u7eed\u822a** \u2014 \u540c\u7b49\u89c4\u6a21\u7684\u4efb\u52a1\uff0cClaude \u503e\u5411\u4e8e\u6570\u6b65\u540e\u6682\u505c\u786e\u8ba4\uff0cCodex \u6301\u7eed\u6267\u884c\u76f4\u5230\u5b8c\u6210\u3002\n2. **\"\u8bf7\u7ee7\u7eed\"\u7684\u6548\u679c** \u2014 \u5728 Codex \u4e2d\u53ef\u4ee5\u6709\u6548\u5ef6\u957f\u6267\u884c\uff0c\u5728 Claude Code \u4e2d\u53cd\u800c\u4e2d\u65ad\u5f53\u524d\u5de5\u4f5c\u6d41\u3002\n3. **\u5355\u6b65\u6267\u884c\u8d28\u91cf** \u2014 \u4f53\u611f\u4e0a Claude \u5bf9\u9879\u76ee\u4e0a\u4e0b\u6587\u7684\u628a\u63e1\u66f4\u7cbe\u51c6\uff0c\u4f46\u6210\u56e0\u5c1a\u4e0d\u660e\u786e\uff08\u6a21\u578b\u80fd\u529b\u3001prompt \u5de5\u7a0b\u3001harness \u8bbe\u8ba1\u5747\u53ef\u80fd\u8d21\u732e\uff09\u3002\n\n\u4ece\u6e90\u7801\u5206\u6790\u6765\u770b\uff0c\u8fd9\u4e09\u4e2a\u8868\u73b0\u53ef\u80fd\u6307\u5411\u540c\u4e00\u4e2a\u67b6\u6784\u5c42\u9762\u7684\u5206\u6b67\uff1a**\u4e24\u8005\u9009\u62e9\u4e86\u4e0d\u540c\u7684 context \u7ba1\u7406\u7b56\u7565**\u3002Claude Code \u6bcf\u8f6e append \u540e\u4f1a\u518d\u8dd1\u4e00\u6761\u4fee\u6539\u7ba1\u7ebf\u5e76\u91cd\u7ec4 system prompt\u3001\u91cd\u6ce8\u5165 CLAUDE.md / Memory\uff1bCodex \u5e38\u6001\u4e0b\u53ea\u8ffd\u52a0 items \u5e76\u4fdd\u6301 instructions \u4e0d\u53d8\uff0c\u4ec5\u5728 compact \u7b49\u673a\u5236\u89e6\u53d1\u65f6\u6539\u5199\u5386\u53f2\u3002\u524d\u8005\u7684\u673a\u5236\u6709\u5229\u4e8e\u7ef4\u6301\u5355\u6b65 context \u8d28\u91cf\uff0c\u4f46\u4e5f\u5f15\u5165\u4e86\u66f4\u591a harness \u7ea7\u522b\u7684\u6267\u884c\u6469\u64e6\uff1b\u540e\u8005\u7684\u673a\u5236\u51cf\u5c11\u4e86\u6469\u64e6\uff0c\u4f46\u540e\u671f context \u5bc6\u5ea6\u4f1a\u4e0b\u964d\u3002\u672c\u6587\u4ece\u6e90\u7801\u5c42\u9762\u68b3\u7406\u8fd9\u4e9b\u673a\u5236\u5dee\u5f02\uff0c\u5e76\u63d0\u70bc\u4e09\u79cd\u5ef6\u957f Agent \u8fd0\u884c\u65f6\u95f4\u7684\u8bbe\u8ba1\u6a21\u5f0f\u3002\u9700\u8981\u8bf4\u660e\u7684\u662f\uff0c\u4f53\u611f\u5dee\u5f02\u7684\u6210\u56e0\u662f\u591a\u7ef4\u5ea6\u7684\uff08\u6a21\u578b\u80fd\u529b\u3001prompt \u5de5\u7a0b\u3001harness \u8bbe\u8ba1\u3001API \u534f\u8bae\u7b49\uff09\uff0c\u672c\u6587\u805a\u7126 harness \u548c prompt \u5c42\u9762\u53ef\u4ece\u6e90\u7801\u9a8c\u8bc1\u7684\u90e8\u5206\u3002\n\n### 1.1 \u5dee\u5f02\u6709\u591a\u5927\uff1f\n\n\u4e0b\u9762\u7684 GIF \u662f\u4e00\u6b21\u5b9e\u9645\u7684 Codex \u957f\u7a0b\u6267\u884c\u2014\u2014\u7b2c\u4e00\u4e2a turn \u505c\u4e0b\u540e\uff0c\u901a\u8fc7\"\u8bf7\u7ee7\u7eed\"\u542f\u52a8\u7b2c\u4e8c\u4e2a turn \u7ee7\u7eed\u5de5\u4f5c\uff1a\n\n![Codex \u957f\u7a0b\u6267\u884c + \"\u8bf7\u7ee7\u7eed\"\u793a\u4f8b](assets/codex-long-running.gif)\n\n\u4ee5\u4e0b\u662f\u7b14\u8005\u672c\u5730 session \u5386\u53f2\u7684\u7edf\u8ba1\uff08\u5ea6\u91cf\u65b9\u5f0f\uff1aagent \u6d3b\u52a8\u4e8b\u4ef6\u7684\u65f6\u95f4\u7a97\u53e3\uff0c\u5185\u90e8 > 30min \u7a7a\u9699\u622a\u65ad\uff0c\u4ec5\u4fdd\u7559 \u2265 1min \u7684 turn\u3002\u7b14\u8005\u503e\u5411\u4e8e\u628a\u65e0\u4eba\u503c\u5b88\u6279\u91cf\u4efb\u52a1\u4ea4\u7ed9 Codex\u3001\u4ea4\u4e92\u5f0f\u573a\u666f\u4ea4\u7ed9 Claude Code\uff0c\u4efb\u52a1\u5206\u914d\u4e0d\u540c\uff0c\u975e\u63a7\u5236\u5b9e\u9a8c\uff09\uff1a\n\n**\u524d\u53f0\u5355 turn \u81ea\u4e3b\u6267\u884c\u65f6\u957f**\uff08\u540c\u53e3\u5f84\u5bf9\u6bd4\uff0c\u5747\u4e3a\u524d\u53f0 agent\u3001\u65e0\u7528\u6237\u6d88\u606f\u4ecb\u5165\uff09\uff1a\n\n<!-- SPLIT:Claude Code (975 turns)|Codex (925 turns) -->\n\n```\n  1-3 min:   92.6%\n  3-10 min:   6.6%\n  10+ min:    0.7%\n\n  P50:  1.4 min\n  P90:  2.6 min\n  Max: 10.2 min\n```\n\n```\n  1-3 min:   46.4%\n  3-10 min:  33.9%\n  10+ min:   19.7%\n\n  P50:  3.4 min\n  P90: 18.8 min\n  Max: 286 min (4.8h, 393 steps)\n```\n\n<!-- END_SPLIT -->\n\n**\u957f\u7a0b\u8fd0\u884c\u6a21\u5f0f\u4e0d\u540c**\uff1aCodex \u5728\u524d\u53f0\u5355 turn \u65e0\u4eba\u503c\u5b88\u6570\u5c0f\u65f6\uff08\u5178\u578b\u6848\u4f8b\uff1a286 min \"\u76ef\u7740\u76f4\u5230\u5199\u5b8c\u98de\u4e66\u8868\"\u3001263 min \"\u76f4\u5230 v54 \u62a5\u544a\u751f\u6210\"\uff09\u3002Claude Code \u7684\u524d\u53f0\u5355 turn \u96c6\u4e2d\u5728 1-3 \u5206\u949f\uff0c\u4f46\u901a\u8fc7\u540e\u53f0 agent\uff08`run_in_background`\uff09\u652f\u6301\u957f\u7a0b\u4efb\u52a1\u2014\u2014\u540e\u53f0 agent \u6700\u957f\u5bc6\u96c6\u6267\u884c 211 min\uff083.5h\uff09\uff0cP90 = 41 min\u3002\n\n<details>\n<summary><strong>\u5206\u6790\u5bf9\u8c61\u4e0e\u5f15\u7528\u8bf4\u660e</strong></summary>\n\n\u672c\u6587\u5206\u6790\u7684\u5bf9\u8c61\u5206\u4e24\u5c42\u3002**\u57fa\u7840 harness**\uff08\u4e8c\u3001\u4e09\u8282\u7684\u5faa\u73af\u4e0e context \u673a\u5236\u5bf9\u6bd4\uff09\uff1a\n\n| harness | \u7248\u672c | \u6765\u6e90 |\n|---------|------|------|\n| [Claude Code](https://github.com/anthropics/claude-code) | 2.1.88 | Anthropic \u5b98\u65b9 CLI |\n| [Codex CLI](https://github.com/openai/codex) (codex-rs) | \u2014 | OpenAI \u5b98\u65b9 CLI |\n\n**\u957f\u7a0b\u6267\u884c\u8303\u5f0f**\uff08\u7b2c\u56db\u8282\u5bf9\u6bd4\u56db\u79cd\u6a21\u5f0f\uff09\uff1a\n\n| \u8303\u5f0f | \u4ee3\u8868 | \u5c42\u9762 | \u6765\u6e90 |\n|------|------|------|------|\n| Prompt \u9a71\u52a8 | Codex | prompt | OpenAI \u5b98\u65b9 |\n| Hook \u9a71\u52a8\u81ea\u5faa\u73af | [Ralph Wiggum](https://github.com/anthropics/claude-code/tree/main/plugins/ralph-wiggum) | harness hook | Anthropic \u5b98\u65b9 plugin |\n| \u6d41\u6c34\u7ebf + \u5b50\u4ee3\u7406\u6247\u51fa | [understand-anything](https://github.com/Lum1104/Understand-Anything) | \u67b6\u6784 | \u7b2c\u4e09\u65b9 Claude Code plugin |\n| \u591a Session \u6301\u4e45\u4f53 | [OpenClaw](https://github.com/openclaw/openclaw) | \u5e73\u53f0 | \u5f00\u6e90 AI \u4ee3\u7406\u5e73\u53f0 |\n\nRalph Wiggum\u3001understand-anything\u3001OpenClaw \u4ee3\u8868\u4e86\u5728\u5b98\u65b9 harness \u4e4b\u4e0a\uff0c\u793e\u533a\u548c\u5b98\u65b9\u81ea\u8eab\u901a\u8fc7\u4e0d\u540c\u5c42\u9762\u7684\u6269\u5c55\u89e3\u51b3\u957f\u7a0b\u8fd0\u884c\u95ee\u9898\u3002\n\n</details>\n\n---\n\n## \u4e8c\u3001\u56db\u79cd Agent Loop \u7684\u9a71\u52a8\u65b9\u5f0f\n\n\u5148\u4ece\u5168\u5c40\u89c6\u89d2\u7406\u89e3\u56db\u79cd\u6846\u67b6\u7684\u5faa\u73af\u9a71\u52a8\u65b9\u5f0f\uff0c\u518d\u9010\u4e2a\u6df1\u5165\u5dee\u5f02\u3002\u8fd9\u56db\u79cd\u8bbe\u8ba1\u8986\u76d6\u4e86\u5f53\u524d Coding Agent \u7684\u4e3b\u8981\u67b6\u6784\u6d41\u6d3e\u3002\n\n### 2.1 \u5faa\u73af\u9aa8\u67b6\u76f8\u540c\n\n\u4e24\u8005\u7684 Agent Loop \u6838\u5fc3\u5224\u5b9a\u903b\u8f91\u76f8\u4f3c\u2014\u2014\u90fd\u662f\"\u6709 tool_call \u5c31\u7ee7\u7eed\uff0c\u6ca1\u6709\u5c31\u505c\"\u3002\u4f46\u5faa\u73af\u5185\u90e8\u7684 context \u6784\u5efa\u65b9\u5f0f\u3001\u9000\u51fa\u524d\u7684\u5e72\u9884\u673a\u5236\u3001\u4ee5\u53ca\u5faa\u73af\u5916\u90e8\u7684 prompt \u548c session \u8bbe\u8ba1\u5b58\u5728\u663e\u8457\u5206\u6b67\u3002\n\n<!-- SPLIT:Claude Code (query.ts:307)|Codex (codex.rs:6202) -->\n\n```\nwhile (true) {\n  \u2460 \u7ec4\u88c5 system prompt (15 section)\n    + \u6ce8\u5165 CLAUDE.md \u5230 messages[0]\n    + 5 \u5c42\u538b\u7f29\u7ba1\u7ebf\u88c1\u526a\u5386\u53f2\u6d88\u606f\n    + \u5f02\u6b65\u6ce8\u5165 Memory (Sonnet sideQuery)\n\n  \u2461 \u6d41\u5f0f\u8c03\u7528 Anthropic Messages API\n\n  \u2462 \u6536\u96c6 tool_use blocks\n    if (tool_use > 0) \u2192 needsFollowUp = true\n\n  \u2463 \u6267\u884c tools\n\n  \u2464 if (!needsFollowUp) {\n      Stop Hook \u2192 \u53ef\u6ce8\u5165 error \u91cd\u8bd5\n      Token Budget \u2192 +500k \u53ef\u5f3a\u5236\u7ee7\u7eed\n      return completed   \u2190 \u6b63\u5e38\u9000\u51fa\n    }\n\n  \u2465 if (maxTurns \u8d85\u9650)\n      return max_turns\n      // \u4ea4\u4e92\u6a21\u5f0f\u901a\u5e38\u4e0d\u8bbe; \u5b50\u4ee3\u7406\u9ed8\u8ba4 200\n\n  \u2466 autoCompact (\u6709 circuit breaker)\n    continue\n}\n```\n\n```\nloop {\n  \u2460 drain pending_input \u961f\u5217\n    (\u7528\u6237\u5728\u6267\u884c\u671f\u95f4\u53d1\u7684\u6d88\u606f\u5728\u6b64\u5904\u6d88\u8d39)\n\n  \u2461 \u7ebf\u6027\u8ffd\u52a0 items \u5230 ContextManager\n    instructions \u4e0d\u53d8\n\n  \u2462 \u6d41\u5f0f\u8c03\u7528 OpenAI Responses API\n    (WebSocket \u589e\u91cf: \u53ea\u53d1 delta + previous_response_id)\n\n  \u2463 \u6536\u96c6 tool_call\n    if (has_tool_call) \u2192 model_needs_follow_up = true\n\n  \u2464 needs_follow_up =\n      model_needs_follow_up\n      || has_pending_input   \u2190 \u961f\u5217\u975e\u7a7a\u4e5f\u7ee7\u7eed\n\n  \u2465 if (token \u8d85\u9650 && needs_follow_up)\n      compact \u2192 continue    \u2190 \u65e0 circuit breaker\n\n  \u2466 if (!needs_follow_up) {\n      Stop Hook \u2192 \u53ef\u6ce8\u5165 continuation_prompt\n      break                 \u2190 \u6b63\u5e38\u9000\u51fa\n    }\n    continue\n}\n```\n\n<!-- END_SPLIT -->\n\n\u4e09\u4e2a\u5dee\u5f02\u70b9\u7684\u4f4d\u7f6e\u6807\u6ce8\uff1a\n- **\u5dee\u5f021 (\u4e0a\u4e0b\u6587\u7406\u89e3)**: \u6b65\u9aa4 \u2460 \u2014 Claude Code \u7684 15 section + Memory \u9884\u53d6 vs Codex \u7684\u6241\u5e73 instructions + \u7ebf\u6027\u8ffd\u52a0\n- **\u5dee\u5f022 (\u7eed\u822a)**: \u6b65\u9aa4 \u2464\u2465 \u2014 Claude Code \u7684 compact circuit breaker vs Codex \u7684 pending_input \u961f\u5217\n- **\u5dee\u5f023 (\u7528\u6237\u8f93\u5165)**: \u6b65\u9aa4 \u2460 \u2014 Claude Code \u542f\u52a8\u65b0 query \u5faa\u73af vs Codex \u5728\u5f53\u524d turn \u5185 drain pending_input\n\n---\n\n### 2.2 \u56db\u79cd\u6846\u67b6\u5982\u4f55\u9a71\u52a8\u6267\u884c\n\n**\u7b2c\u4e00\u7ec4\uff1a\u4e24\u5927\u5b98\u65b9 Coding Agent**\n\n<!-- SPLIT:Claude Code \u2014 \u5355\u5faa\u73af + \u8c28\u614e\u9000\u51fa|Codex \u2014 \u53cc\u961f\u5217 + \u6301\u7eed\u6267\u884c -->\n\n```\nwhile (true) {              // query.ts:307\n  streamAPI(messages)        // Messages API\n  extractToolUse(response)\n  if (toolUse > 0)\n    needsFollowUp = true     // query.ts:832\n  executeTools()\n\n  if (!needsFollowUp) {      // query.ts:1062\n    handleStopHooks()\n    \u2192 blockingErrors \u2192 continue\n    \u2192 tokenBudget < 90% \u2192 continue\n    return completed         // \u2190 \u6b63\u5e38\u9000\u51fa\n  }\n  if (maxTurns exceeded)\n    return max_turns         // \u5b50\u4ee3\u7406\u9ed8\u8ba4 200\n  autoCompact(if needed)     // \u6709 circuit breaker\n  continue\n}\n```\n\n```\nloop {                       // codex.rs:6202\n  drain_pending_input()      // \u2190 \u961f\u5217\u6a21\u578b\u72ec\u6709\n  record(pending)\n\n  streamAPI(prompt)          // Responses API + WS\n  if (has_tool_call)\n    model_needs_follow_up = true\n\n  needs_follow_up =\n    model_needs_follow_up\n    || has_pending_input     // codex.rs:6293\n\n  if (token_limit && needs_follow_up)\n    auto_compact() \u2192 continue  // \u65e0 circuit breaker\n\n  if (!needs_follow_up) {    // codex.rs:6331\n    run_stop_hooks()\n    \u2192 should_block \u2192 continue  // \u5f3a\u5236\u7eed\u822a\n    break                    // \u2190 \u6b63\u5e38\u9000\u51fa\n  }\n  continue\n}\n```\n\n<!-- END_SPLIT -->\n\n**\u7b2c\u4e8c\u7ec4\uff1a\u7b2c\u4e09\u65b9\u751f\u6001\u7684\u957f\u7a0b\u6267\u884c\u65b9\u6848**\n\n<!-- SPLIT:understand-anything \u2014 \u6d41\u6c34\u7ebf + \u5b50\u4ee3\u7406\u6247\u51fa|OpenClaw \u2014 \u591a Session \u6301\u4e45\u4f53 -->\n\n```\nSKILL.md \u4e3b\u63a7:\n\nPhase 0: preflight()          // \u589e\u91cf/\u5168\u91cf\u5224\u65ad\n  \u2193\nPhase 1: dispatch(scanner)    // \u5b50 agent \u72ec\u7acb context\n  \u2192 scan-result.json          // \u78c1\u76d8\u4f20\u9012\n  \u2193\nPhase 2: batch(20-30 files)\n  dispatch(analyzer) \u00d7 5      // \u5e76\u884c\u6247\u51fa\n  \u2192 batch-N.json\n  merge-batch-graphs.py       // \u786e\u5b9a\u6027\u811a\u672c\u5408\u5e76\n  \u2193\nPhase 3: dispatch(reviewer)   // \u8d28\u91cf\u5ba1\u67e5\n  \u2193\nPhase 4: dispatch(arch)       // \u5206\u5c42\n  \u2193\nPhase 5: dispatch(tour)       // \u5bfc\u89c8\n  \u2193\nPhase 6: validate.cjs         // \u786e\u5b9a\u6027\u6821\u9a8c\n  \u2193\nPhase 7: \u2192 knowledge-graph.json\n\n\u6bcf\u4e2a Phase \u8f93\u51fa\u5728\u78c1\u76d8\u4e0a\uff0c\ncompact \u4e0d\u5f71\u54cd\u5df2\u5b8c\u6210\u5de5\u4f5c\u3002\n```\n\n```\nGateway \u5e38\u9a7b (port:18789):\n\n\u251c\u2500 \u6536\u5230\u6d88\u606f \u2192 \u542f\u52a8 Session:\n\u2502    read AGENTS.md, SOUL.md\n\u2502    execute task\n\u2502    write memory/YYYY-MM-DD.md\n\u2502    session \u7ed3\u675f\n\u2502\n\u251c\u2500 Heartbeat \u2192 \u65b0 Session:\n\u2502    read HEARTBEAT.md\n\u2502    check email/calendar\n\u2502    \u6709\u4e8b \u2192 \u901a\u77e5; \u65e0\u4e8b \u2192 OK\n\u2502\n\u251c\u2500 Cron \u2192 isolated Session:\n\u2502    \u72ec\u7acb context\n\u2502    \u7ed3\u679c\u6295\u9012\u5230 channel\n\u2502\n\u2514\u2500 Sub-Agent Spawn: pact.ts\n// compact \u8fde\u7eed\u5931\u8d25 3 \u6b21\n//   \u2192 circuit breaker \u89e6\u53d1\n//   \u2192 \u505c\u6b62 compact\n// blocking limit (context window - 3K)\n//   \u2192 \u76f4\u63a5\u7ec8\u6b62\u5faa\u73af\n```\n\n```rust\n// Codex \u2014 codex.rs:6312-6328\nif token_limit_reached && needs_follow_up {\n    run_auto_compact(...).await;\n    client_session.reset_websocket_session();\n    continue;  // \u65e0\u6761\u4ef6\u7ee7\u7eed\n}\n// \u65e0 circuit breaker\n// compact \u5931\u8d25 \u2192 \u9010\u6761\u5220\u6700\u65e7\u6761\u76ee\u540e\u91cd\u8bd5\n```\n\n<!-- END_SPLIT -->\n\n| | Claude Code | Codex |\n|--|-------------|-------|\n| Compact \u540e | `continue`\uff08\u4f46\u6709 circuit breaker\uff09 | `continue`\uff08\u65e0\u6761\u4ef6\u7ee7\u7eed\uff09 |\n| Compact \u5931\u8d25 | 3 \u6b21\u540e\u653e\u5f03 | \u5220\u6700\u65e7\u6761\u76ee\u91cd\u8bd5\uff08`compact.rs:215`\uff09 |\n| \u7d27\u6025\u5236\u52a8 | blocking limit \u2192 \u76f4\u63a5 `return` | \u65e0 |\n| \u670d\u52a1\u7aef compact | N/A | \u8d70 `/responses/compact` |\n\n---\n\n### 3.7 \u7528\u6237\u8f93\u5165\uff1a\u961f\u5217\u6392\u961f vs \u65b0\u5efa\u5faa\u73af\n\n\u5728 Codex \u4e2d\uff0c\u4e00\u79cd\u5e38\u89c1\u7684\u5ef6\u957f\u6267\u884c\u65b9\u5f0f\u662f\u9884\u5148\u6392\u961f\u591a\u6761\"\u8bf7\u7ee7\u7eed\"\u6d88\u606f\uff1a\n\n![Codex \u4e2d\u6392\u961f\u53d1\u9001\"\u8bf7\u7ee7\u7eed\"\u7684\u5b9e\u9645\u64cd\u4f5c](assets/codex-please-continue.png)\n\n\u8fd9\u4e9b\u6d88\u606f\u4e0d\u4f1a\u6253\u65ad\u5f53\u524d\u6267\u884c\uff0c\u800c\u662f\u5728 pending_input \u961f\u5217\u4e2d\u7b49\u5f85\u5f53\u524d turn \u5b8c\u6210\u540e\u4f9d\u6b21\u6d88\u8d39\u3002\u540c\u6837\u7684\u64cd\u4f5c\u5728 Claude Code \u4e2d\u4f1a\u542f\u52a8\u65b0\u7684 query \u5faa\u73af\u3002\u8fd9\u4e00\u5dee\u5f02\u6e90\u4e8e\u4e24\u79cd\u4e0d\u540c\u7684\u7528\u6237\u8f93\u5165\u5904\u7406\u6a21\u578b\u3002\n\n<!-- SPLIT:Claude Code: \u65e0\u7b49\u4ef7 steer (query.ts:832)|Codex: turn/steer \u961f\u5217\u673a\u5236 (codex.rs:4148) -->\n\n```typescript\n// query.ts:832 \u2014 \u552f\u4e00\u7684\u7ee7\u7eed\u4fe1\u53f7\nif (msgToolUseBlocks.length > 0) {\n  needsFollowUp = true\n}\n// \u53ea\u770b\u6a21\u578b\u662f\u5426\u8fd4\u56de\u4e86 tool_use\n// \u6ca1\u6709 || has_pending_input\n// \u65b0\u7528\u6237\u6d88\u606f \u2192 \u65b0 query() \u8c03\u7528\n\n\n```\n\n```rust\n// codex.rs:4148 \u2014 Session.steer_input()\nfn steer_input(&self, input, expected_turn_id) {\n    // 1. \u68c0\u67e5\u6709\u6d3b\u8dc3 turn\n    // 2. \u68c0\u67e5 turn_id \u5339\u914d\n    // 3. \u5165\u961f\uff0c\u4e0d\u6253\u65ad\n    turn_state.push_pending_input(input);\n}\n\n// codex.rs:6293 \u2014 \u5faa\u73af\u5185\u5224\u5b9a\nlet needs_follow_up =\n    model_needs_follow_up\n    || has_pending_input;\n// \u961f\u5217\u6709\u6d88\u606f \u2192 \u5f3a\u5236\u7ee7\u7eed\n```\n\n<!-- END_SPLIT -->\n\n**\"\u8bf7\u7ee7\u7eed\"\u5728\u4e24\u8fb9\u7684\u5b8c\u6574\u751f\u547d\u5468\u671f\uff1a**\n\n<!-- SPLIT:Claude Code: \u65b0\u6d88\u606f \u2192 \u65b0 query \u5faa\u73af|Codex: \u5165\u961f \u2192 \u7b49\u5b8c\u6210 \u2192 \u6d88\u8d39 -->\n\n```\n\u7528\u6237\u53d1 \"\u8bf7\u7ee7\u7eed\"\n  \u2192 \u65b0\u7684 user message\n  \u2192 \u8fdb\u5165\u4e0b\u4e00\u4e2a query() \u8c03\u7528\n  \u2192 \u5f53\u524d turn \u6b63\u5e38\u5b8c\u6210\n  \u2192 \u65b0\u8f93\u5165\u6539\u53d8\u6267\u884c\u8f68\u8ff9\n  \u2192 \u6a21\u578b\u5728\u65b0\u4e0a\u4e0b\u6587\u4e2d\u91cd\u65b0\u89c4\u5212\n  \u2192 \u800c\u975e\u5728\u539f\u8f68\u8ff9\u4e0a\u5ef6\u7eed\n\n```\n\n```\n\u7528\u6237\u53d1 \"\u8bf7\u7ee7\u7eed\"\n  \u2192 turn/steer\n  \u2192 push_pending_input()    [\u5165\u961f]\n  \u2192 \u5f53\u524d tool call \u6b63\u5e38\u5b8c\u6210\n  \u2192 needs_follow_up =\n      false || true(\u961f\u5217\u975e\u7a7a) = true\n  \u2192 continue\n  \u2192 drain \"\u8bf7\u7ee7\u7eed\" \u2192 \u6ce8\u5165\u5386\u53f2\n  \u2192 \u518d\u6b21\u8c03\u6a21\u578b \u2192 \u7ee7\u7eed\u5de5\u4f5c\n```\n\n<!-- END_SPLIT -->\n\n> Claude Code \u5e76\u975e\"\u7acb\u5373\u4e2d\u65ad\u5f53\u524d\u5de5\u5177\u6267\u884c\"\u2014\u2014\u5f53\u524d turn \u7684 tool call \u94fe\u4f1a\u6b63\u5e38\u5b8c\u6210\u3002\u4f46\u65b0\u6d88\u606f\u542f\u52a8\u7684\u662f\u4e00\u4e2a\u5168\u65b0\u7684 query \u5faa\u73af\uff0c\u6a21\u578b\u5728\u65b0\u4e0a\u4e0b\u6587\u4e2d\u91cd\u65b0\u51b3\u7b56\uff0c\u800c\u975e\u5728\u539f\u6709 turn \u5185\u8ffd\u52a0\u540e\u7ee7\u7eed\u3002\n\nturn/steer \u6a21\u5f0f\u7684\u6838\u5fc3\u6d1e\u5bdf\uff1a**\u8ba9\u7528\u6237\u6d88\u606f\u6392\u961f\u7b49\u5f53\u524d step \u5b8c\u6210\u540e\u518d\u5904\u7406**\uff0c\u800c\u4e0d\u662f\u7acb\u5373\u6ce8\u5165\u3002\u8fd9\u662f\u4e00\u4e2a\u901a\u7528\u7684 Agent \u8bbe\u8ba1\u6a21\u5f0f\u3002\n\n---\n\n## \u56db\u3001\u56db\u79cd\u957f\u7a0b\u8fd0\u884c\u6a21\u5f0f\n\n\u7b2c\u4e09\u8282\u672b\u5c3e\u63d0\u5230 understand-anything \u9009\u62e9\u6d41\u6c34\u7ebf\u6a21\u5f0f\u7ed5\u8fc7\u4e86 Claude Code \u7684\u957f turn \u7ec8\u6b62\u98ce\u9669\u3002\u5b9e\u9645\u4e0a\uff0c\u793e\u533a\u5df2\u7ecf\u53d1\u5c55\u51fa\u56db\u79cd\u4e0d\u540c\u7684\u957f\u7a0b\u6267\u884c\u7b56\u7565\uff0c\u5206\u522b\u5728 prompt\u3001hook\u3001\u67b6\u6784\u3001\u5e73\u53f0\u56db\u4e2a\u5c42\u9762\u89e3\u51b3\"\u6a21\u578b\u60f3\u505c\"\u7684\u95ee\u9898\u3002\n\n### 4.1 Prompt \u9a71\u52a8\n\n\u4ee3\u8868\uff1a[Codex CLI](https://github.com/openai/codex)\uff08`codex-rs/protocol/src/prompts/base_instructions/default.md:125`\uff09\n\n```\n\u6838\u5fc3\u673a\u5236\uff1a\n  prompt = \"keep going until completely resolved\"\n  + \u96f6\u6b65\u6570\u9650\u5236\uff08\u4ee3\u7801\u5e93\u4e2d\u65e0 max_steps/max_tool_calls\uff09\n  + compact \u2192 continue\uff08\u4e0d\u505c\uff09\n  + pending_input \u961f\u5217\u5f3a\u5236\u5ef6\u7eed\n  + Stop Hook\uff08feature flag \u9ed8\u8ba4\u5173\u95ed\uff09\u53ef\u62d2\u7edd\u505c\u6b62\u5e76\u6ce8\u5165 continuation_prompt\n\n\u9002\u7528\u573a\u666f\uff1a\u5355\u4e2a\u5927\u4efb\u52a1\uff08\u91cd\u6784\u3001\u957f\u94fe\u8def\u8c03\u8bd5\u3001\u4ee3\u7801\u8fc1\u79fb\uff09\n\u4eba\u5de5\u4ecb\u5165\uff1a\u8fd1\u96f6\uff08\u9664\u975e sandbox \u6743\u9650\u4e0d\u8db3\u9700\u8981 escalation\uff09\n\u5355 turn \u7eed\u822a\uff1a\u6838\u5fc3\u5faa\u73af\u4e2d\u672a\u53d1\u73b0\u663e\u5f0f step \u4e0a\u9650\uff0ccompact \u6709\u6548\u5373\u53ef\u6301\u7eed\u6267\u884c\n\u98ce\u9669\uff1a\u6a21\u578b\u53ef\u80fd\u5728\u9519\u8bef\u65b9\u5411\u4e0a\u8d70\u5f88\u8fdc\u624d\u88ab\u53d1\u73b0\n```\n\n### 4.2 Hook \u9a71\u52a8\u81ea\u5faa\u73af\n\n\u4ee3\u8868\uff1a[Ralph Wiggum](https://github.com/anthropics/claude-code/tree/main/plugins/ralph-wiggum)\uff08Claude Code \u5b98\u65b9 plugin\uff0c`plugins/ralph-wiggum/`\uff09[9]\n\n```\n\u6838\u5fc3\u673a\u5236\uff1a\n  Stop Hook \u62e6\u622a end_turn \u2192 \u91cd\u65b0\u6ce8\u5165\u540c\u4e00\u4e2a prompt \u2192 \u81ea\u5faa\u73af\n  + completion-promise \u7cbe\u786e\u5339\u914d\u7ec8\u6b62\u8bcd\n  + max-iterations \u786c\u6027\u4e0a\u9650\uff08\u63a8\u8350 10-20\uff09\n  + \u6587\u4ef6 + git \u6301\u4e45\u5316\uff08\u6bcf\u6b21\u8fed\u4ee3\u7684\u4fee\u6539\u4fdd\u7559\u5728\u78c1\u76d8\uff09\n\n  /ralph-loop \"\u91cd\u6784 UI\uff0c\u5b8c\u6210\u540e\u8f93\u51fa COMPLETE\"\n    --completion-promise \"COMPLETE\" --max-iterations 15\n\n  Claude \u5de5\u4f5c \u2192 end_turn \u2192 Stop Hook \u62e6\u622a\n  \u2192 \u91cd\u65b0\u6ce8\u5165 prompt \u2192 \u7ee7\u7eed\u5de5\u4f5c\n  \u2192 \u76f4\u5230\u8f93\u51fa \"COMPLETE\" \u6216\u8fbe\u5230 max-iterations\n\n\u9002\u7528\u573a\u666f\uff1a\u6709\u660e\u786e\u9a8c\u6536\u6807\u51c6\u7684\u8fed\u4ee3\u4efb\u52a1\uff08TDD\u3001UI \u91cd\u6784\u3001\u4ee3\u7801\u8fc1\u79fb\uff09\n\u4eba\u5de5\u4ecb\u5165\uff1a\u8fd1\u96f6\uff08\u8bbe\u597d max-iterations \u540e\u53ef\u79bb\u5f00\uff09\n\u5355 turn \u7eed\u822a\uff1asession \u5185\u81ea\u5faa\u73af\uff0ccontext \u8de8\u8fed\u4ee3\u7d2f\u79ef\n\u98ce\u9669\uff1acontext \u7d2f\u79ef\u5bfc\u81f4\u540e\u671f\u8d28\u91cf\u4e0b\u964d\uff08\u4e0e Codex \u540c\u7c7b\u95ee\u9898\uff09\n```\n\n\u8fd9\u4e2a\u6a21\u5f0f\u76f4\u63a5\u56de\u5e94\u4e86 2.4 \u51b3\u7b56\u6811\u4e2d Claude Code \u7684 \"Stop Hook?\uff08\u9ed8\u8ba4\u65e0\u914d\u7f6e\uff09\"\u2014\u2014Ralph Wiggum \u5c31\u662f\u90a3\u4e2a\u914d\u7f6e\u3002\u5b83\u5728 harness \u5c42\uff08hook\uff09\u800c\u975e prompt \u5c42\u5b9e\u73b0\u4e86\u6301\u7eed\u6267\u884c\uff0c\u672c\u8d28\u4e0a\u662f\u628a Claude Code \u7684\"\u8c28\u614e\u9000\u51fa\"\u884c\u4e3a\u6539\u5199\u6210\u4e86\u7c7b\u4f3c Codex \u7684\"\u7ee7\u7eed\u5de5\u4f5c\"\u3002\n\n\u793e\u533a\u8fd8\u6709\u4e00\u79cd\u5916\u90e8\u53d8\u4f53\uff08[ghuntley.com/loop](https://ghuntley.com/loop/)\uff09\uff1a\u7528 bash \u65e0\u9650\u5faa\u73af\u53cd\u590d\u542f\u52a8 agent\uff08\u4f2a\u4ee3\u7801\uff1a`while :; do cat PROMPT.md | claude-code ; done`\uff09\uff0c\u6bcf\u6b21\u542f\u52a8 fresh context\uff0c\u72b6\u6001\u5b8c\u5168\u9760\u6587\u4ef6\u548c git \u4f20\u9012\u3002\u4e24\u79cd\u5b9e\u73b0\u7684\u53d6\u820d\uff1asession \u5185\u81ea\u5faa\u73af\u4fdd\u7559\u4e86 context \u8fde\u7eed\u6027\u4f46\u6709\u7d2f\u79ef\u98ce\u9669\uff0c\u5916\u90e8\u5faa\u73af\u727a\u7272 context \u8fde\u7eed\u6027\u6362\u53d6\u6bcf\u6b21 fresh start\u3002\n\n### 4.3 \u6d41\u6c34\u7ebf + \u5b50\u4ee3\u7406\u6247\u51fa\n\n\u4ee3\u8868\uff1a[understand-anything](https://github.com/Lum1104/Understand-Anything)\uff08Claude Code plugin\uff09\u3002\u4f5c\u4e3a\u7b2c\u4e09\u65b9 plugin \u7684\u5178\u578b\u6848\u4f8b\uff0c\u5176\u8bbe\u8ba1\u6a21\u5f0f\u53ef\u63a8\u5e7f\u5230\u4efb\u4f55\u9700\u8981\u5728 Claude Code \u4e0a\u6267\u884c\u957f\u7a0b\u7ed3\u6784\u5316\u4efb\u52a1\u7684\u573a\u666f\u3002\n\n```\n\u6838\u5fc3\u673a\u5236\uff1a\n  8 Phase \u6d41\u6c34\u7ebf\uff0c\u6bcf\u4e2a Phase \u7684\u8f93\u51fa\u662f\u78c1\u76d8\u6587\u4ef6\uff1a\n    Phase 1 \u2192 intermediate/scan-result.json\n    Phase 2 \u2192 intermediate/batch-0.json ... batch-N.json\n    Phase 3 \u2192 intermediate/assemble-review.json\n    Phase 4 \u2192 intermediate/layers.json\n    ...\n\n  \u5173\u952e\u8bbe\u8ba1\uff1a\n  1. \u5b50\u4ee3\u7406\u72ec\u7acb context \u2014 file-analyzer \u4e00\u6b21\u53ea\u770b 20-30 \u6587\u4ef6\n  2. \u6700\u591a 5 \u4e2a\u5b50\u4ee3\u7406\u5e76\u884c\uff08\u6247\u51fa\uff09\n  3. \u786e\u5b9a\u6027\u811a\u672c\u505a\u5408\u5e76 \u2014 merge-batch-graphs.py\uff08\u4e0d\u7528 LLM\uff09\n  4. SKILL.md \u662f\u8fde\u7eed\u6307\u4ee4\u5e8f\u5217\uff0c\u65e0\"\u8981\u7ee7\u7eed\u5417\uff1f\"\u68c0\u67e5\u70b9\n  5. \u9519\u8bef\u5bb9\u5fcd \u2014 \u5931\u8d25\u91cd\u8bd5\u4e00\u6b21\uff0c\u518d\u5931\u8d25\u8df3\u8fc7\u7ee7\u7eed\n\n\u9002\u7528\u573a\u666f\uff1a\u7ed3\u6784\u5316\u6279\u91cf\u5206\u6790\uff08\u4ee3\u7801\u5e93\u5206\u6790\u3001\u6587\u6863\u751f\u6210\u3001\u6570\u636e\u5904\u7406\uff09\n\u4eba\u5de5\u4ecb\u5165\uff1a\u4ec5\u521d\u59cb\u8c03\u7528\uff08> 100 \u6587\u4ef6\u65f6\u6709\u786e\u8ba4 gate\uff09\n\u5355 turn \u7eed\u822a\uff1a\u4e3b agent \u6bcf Phase \u53ea\u505a\u7f16\u6392\uff0c\u5b50 agent \u505a\u91cd\u6d3b\n                \u6bcf\u4e2a\u5b50 agent \u662f\u77ed turn\uff0c\u4f46\u6d41\u6c34\u7ebf\u53ef\u6301\u7eed 30+ \u5206\u949f\n\u98ce\u9669\uff1aPhase \u95f4\u7684\u6570\u636e\u4f20\u9012\u4f9d\u8d56 schema \u7ea6\u5b9a\uff0cschema \u53d8\u66f4\u9700\u540c\u6b65\u66f4\u65b0\u6240\u6709 agent\n```\n\n\u8fd9\u4e2a\u6a21\u5f0f\u5728 token \u7ba1\u7406\u4e0a\u6709\u4e00\u4e2a\u91cd\u8981\u7684\u8bbe\u8ba1\uff1a**\u5b50\u4ee3\u7406\u7684\u7ed3\u679c\u901a\u8fc7\u78c1\u76d8\u6587\u4ef6\u4f20\u9012\uff0c\u800c\u975e\u901a\u8fc7 context \u56de\u704c\u4e3b agent**\u3002\u5b50\u4ee3\u7406\u628a `batch-N.json` \u5199\u5230\u78c1\u76d8\uff0c\u4e3b agent \u53ea\u8bfb\u53d6\u5b83\u9700\u8981\u7684\u90e8\u5206\uff08\u5982\u8282\u70b9 ID \u5217\u8868\uff09\uff0c\u4e0d\u4f1a\u628a\u5b50\u4ee3\u7406\u7684\u5b8c\u6574\u5206\u6790\u8fc7\u7a0b\u585e\u8fdb\u81ea\u5df1\u7684 context\u3002\u8fd9\u4e0e\u793e\u533a\u5b9e\u8df5\u7ecf\u9a8c\u4e00\u81f4\u2014\u2014\u6279\u91cf subagent \u7684\u7ed3\u679c\u5e94\u901a\u8fc7\u6587\u4ef6\u4ea4\u4e92\u800c\u975e token \u56de\u704c [1]\u3002\n\n\u4e3a\u4ec0\u4e48\u8fd9\u4e2a\u6a21\u5f0f\u80fd\u5728 Claude Code \u4e0a\u8dd1\u5f88\u4e45\uff08\u5373\u4f7f Claude \u7684 prompt \u8bf4\"\u8c28\u614e\u786e\u8ba4\"\uff09\uff1f\n\n\u56e0\u4e3a SKILL.md **\u672c\u8eab\u5c31\u662f\u4e00\u4efd\u6781\u5176\u8be6\u7ec6\u7684\u6307\u4ee4**\u2014\u2014\u6a21\u578b\u4e0d\u9700\u8981\"\u601d\u8003\u8be5\u600e\u4e48\u505a\"\uff0c\u53ea\u9700\u8981\u6267\u884c\u3002630 \u884c\u7684\u7cbe\u786e\u6b65\u9aa4\u6d88\u9664\u4e86\u6a21\u578b\u7684\u4e0d\u786e\u5b9a\u6027\uff0c\u4e5f\u5c31\u6d88\u9664\u4e86\u5b83\"\u505c\u4e0b\u6765\u786e\u8ba4\"\u7684\u503e\u5411\u3002\n\n### 4.4 \u591a Session \u6301\u4e45\u4f53\n\n\u4ee3\u8868\uff1a[OpenClaw](https://github.com/openclaw/openclaw)\uff08\u5f00\u6e90\u4e2a\u4eba AI \u4ee3\u7406\u5e73\u53f0\uff09\n\n```\n\u6838\u5fc3\u673a\u5236\uff1a\n  Gateway \u8fdb\u7a0b\u5e38\u9a7b (port:18789, KeepAlive)\n    \u2193\n  \u6536\u5230\u6d88\u606f (\u98de\u4e66/Discord/Slack/CLI)\n    \u2193\n  \u542f\u52a8 Session \u2192 \u8bfb AGENTS.md \u2192 \u8bfb SOUL.md \u2192 \u8bfb memory/\n    \u2193\n  \u6267\u884c\u4efb\u52a1 \u2192 \u5199\u56de memory/YYYY-MM-DD.md\n    \u2193\n  Session \u7ed3\u675f\n    \u2193\n  Heartbeat \u5b9a\u65f6\u5524\u9192 / Cron \u7cbe\u786e\u8c03\u5ea6\n    \u2193\n  \u65b0 Session \u2192 \u8bfb memory \u2192 \u68c0\u67e5\u90ae\u4ef6/\u65e5\u5386/...\n\n  \u5173\u952e\u8bbe\u8ba1\uff1a\n  1. Sub-Agent Spawn \u2014 \u540e\u53f0\u5b50 agent\uff08\u5d4c\u5957 5 \u5c42\u3001\u5e76\u53d1 8 \u4e2a\uff09\n  2. Auto-Compaction \u524d silent memory flush \u2014 \u5148\u628a\u91cd\u8981\u4fe1\u606f\u5199\u78c1\u76d8\u518d\u538b\u7f29\n  3. Lobster Workflow Engine \u2014 \u786e\u5b9a\u6027\u5de5\u4f5c\u6d41\uff0c\u5e26\u53ef\u6062\u590d approval gate\n  4. ACP Agents \u2014 \u6865\u63a5 Claude Code/Codex \u4f5c\u4e3a\u5916\u90e8 harness\n\n\u9002\u7528\u573a\u666f\uff1a\u6301\u7eed\u8fd0\u884c\u7684 AI \u52a9\u7406\uff08\u8de8\u5929\u8de8\u5468\u7684\u966a\u4f34\u5f0f Agent\uff09\n\u4eba\u5de5\u4ecb\u5165\uff1a\u88ab\u52a8\u54cd\u5e94\uff08Agent \u4e3b\u52a8\u68c0\u67e5\u90ae\u4ef6/\u65e5\u5386\u540e\u901a\u77e5\uff0c\u7528\u6237\u6309\u9700\u56de\u590d\uff09\n\u5355 turn \u7eed\u822a\uff1a\u4e0d\u8ffd\u6c42\u5355 turn \u8dd1\u4e45\uff0c\u9760\u65e0\u9650\u77ed session \u6784\u6210\u8fde\u7eed\u4f53\u9a8c\n\u98ce\u9669\uff1amemory \u6587\u4ef6\u4f1a\u65e0\u9650\u589e\u957f\uff0c\u9700\u8981\u5b9a\u671f\u6574\u7406\n```\n\n### 4.5 \u6743\u8861\u603b\u89c8\n\n| \u7ef4\u5ea6 | Prompt \u9a71\u52a8 | Hook \u81ea\u5faa\u73af | \u6d41\u6c34\u7ebf+\u5b50\u4ee3\u7406 | \u591a Session \u6301\u4e45\u4f53 |\n|------|-------------|-------------|---------------|-------------------|\n| \u5355 turn \u7eed\u822a | \u672a\u53d1\u73b0\u663e\u5f0f\u4e0a\u9650 | max-iterations \u63a7\u5236 | \u4e3b agent \u77ed\uff0c\u5b50 agent \u77ed | \u4e0d\u8ffd\u6c42 |\n| \u4eba\u5de5\u4ecb\u5165 | \u8fd1\u96f6 | \u8fd1\u96f6 | \u8fd1\u96f6 | \u88ab\u52a8 |\n| \u72b6\u6001\u6301\u4e45\u5316 | context + compact | \u6587\u4ef6 + git | \u78c1\u76d8\u6587\u4ef6 | \u6587\u4ef6 + SQLite |\n| Context \u538b\u529b | \u9ad8\uff08\u5355 turn \u79ef\u7d2f\uff09 | \u4e2d\uff08session \u5185\u7d2f\u79ef\uff09 | \u4f4e\uff08\u5b50 agent \u5206\u6563\uff09 | \u4f4e\uff08\u6bcf session \u72ec\u7acb\uff09 |\n| \u9519\u8bef\u6062\u590d | compact \u964d\u7ea7 | max-iterations \u515c\u5e95 | Phase \u8df3\u8fc7 | session \u91cd\u542f |\n| \u9002\u7528\u5e73\u53f0 | Codex\uff08prompt \u9f13\u52b1\u4e0d\u505c\uff09 | Claude Code\uff08hook \u8986\u76d6\u9000\u51fa\uff09 | Claude Code\uff08SKILL.md \u6d88\u9664\u4e0d\u786e\u5b9a\u6027\uff09 | \u4efb\u610f\uff08\u5e73\u53f0\u65e0\u5173\uff09 |\n\n---\n\n\n## \u4e94\u3001Takeaway\n\n1. **\u7eed\u822a\u5dee\u5f02\u548c\u5355\u6b65\u8d28\u91cf\u53ef\u80fd\u662f\u540c\u4e00\u4e2a context \u7b56\u7565\u7684\u4e24\u9762** \u2014 Claude Code \u6bcf\u8f6e append \u540e\u5bf9\u5386\u53f2\u505a\u5e38\u6001\u5316\u5904\u7406\uff085 \u5c42\u7ba1\u7ebf + Memory \u9884\u53d6 + \u52a8\u6001 system prompt \u91cd\u7ec4\uff09\uff0c\u5176\u673a\u5236\u6709\u5229\u4e8e\u7ef4\u6301\u5355\u6b65\u8d28\u91cf\u4f46\u5f15\u5165\u7ec8\u6b62\u98ce\u9669\uff1bCodex \u5e38\u6001\u4e0b\u53ea\u8ffd\u52a0 items\uff0c\u6469\u64e6\u5c11\u4f46\u540e\u671f context \u7a00\u91ca\u3002\u8fd9\u662f\u6e90\u7801\u5c42\u9762\u53ef\u89c2\u6d4b\u5230\u7684\u673a\u5236\u5dee\u5f02\uff0c\u4f53\u611f\u4e0a\u7684\u56e0\u679c\u5173\u7cfb\u8fd8\u9700\u8981\u66f4\u591a\u7ef4\u5ea6\u7684\u9a8c\u8bc1\u3002\n\n2. **Codex \u7684\u6301\u7eed\u6267\u884c\u6765\u81ea\u4e09\u5c42\u534f\u540c** \u2014 Prompt \u6307\u4ee4\uff08\"keep going\"\uff09+ \u6838\u5fc3\u5faa\u73af\u4e2d\u672a\u53d1\u73b0\u663e\u5f0f step \u4e0a\u9650 + Compact \u65e0 circuit breaker\uff0c\u4e09\u8005\u7f3a\u4e00\u4e0d\u53ef\u3002\n\n3. **\u81ea\u4e3b\u6027\u548c\u53ef\u63a7\u6027\u53ef\u80fd\u662f\u6b63\u4ea4\u7684** \u2014 Codex \u611f\u89c9\"\u4e0d\u53ef\u63a7\"\u66f4\u53ef\u80fd\u662f prompt \u9ed8\u8ba4\uff08\"keep going\"\uff09\uff0c\u800c\u975e\u67b6\u6784\u9650\u5236\u3002\u5b9e\u9645\u4e0a Codex \u5728\u7cbe\u786e\u56de\u6eaf\u4e0a\u6709\u66f4\u591a\u624b\u6bb5\uff1a\u4efb\u610f\u4f4d\u7f6e fork\u3001rollback \u4e0d\u53d7 compact \u9650\u5236\u3001turn/steer \u6392\u961f\u4e0d\u6253\u65ad\u3002Claude Code \u7684 `/rewind` \u53d7\u9650\u4e8e compact \u8fb9\u754c\u3002Prompt \u63a7\u5236\u81ea\u4e3b\u6027\uff0c\u67b6\u6784\u63a7\u5236\u53ef\u63a7\u6027\u3002\n\n4. **\u957f\u65f6\u95f4\u8fd0\u884c\u6709\u56db\u79cd\u8def\u5f84** \u2014 Prompt \u9a71\u52a8\uff08\u5355 turn \u8dd1\u5230\u5e95\uff09\u3001Hook \u81ea\u5faa\u73af\uff08Stop Hook \u62e6\u622a\u9000\u51fa\uff09\u3001\u6d41\u6c34\u7ebf+\u5b50\u4ee3\u7406\uff08\u78c1\u76d8\u6301\u4e45\u5316\u4e2d\u95f4\u72b6\u6001\uff09\u3001\u591a Session \u6301\u4e45\u4f53\uff08\u65e0\u9650 session \u5e8f\u5217\uff09\u3002\u9009\u62e9\u53d6\u51b3\u4e8e\u4efb\u52a1\u7ed3\u6784\u548c\u5e73\u53f0\u7ea6\u675f\u3002\n\n---\n\n## \u516d\u3001\u5f00\u653e\u95ee\u9898\uff1a\u4ece\"\u8dd1\u5f97\u4e45\"\u5230\"\u8dd1\u5f97\u597d\"\n\n\u524d\u4e94\u8282\u805a\u7126\"\u7eed\u822a\"\u2014\u2014\u600e\u4e48\u8ba9 Agent \u8dd1\u66f4\u4e45\u3002\u4f46\u8dd1\u5f97\u4e45\u4e0d\u7b49\u4e8e\u8dd1\u5f97\u597d\u3002\u4ee5\u4e0b\u662f\u672c\u6587\u672a\u80fd\u5145\u5206\u8003\u5bdf\u3001\u7559\u5f85\u540e\u7eed\u63a2\u7d22\u7684\u65b9\u5411\u3002\n\n### 6.1 \u534f\u4f5c\u6a21\u5f0f\u4e0e\u5728\u573a\u4ef7\u503c\n\n\u56de\u987e\u7b14\u8005\u7684\u4f7f\u7528\u6570\u636e\uff1a\u4ea4\u7ed9 Codex \u7684\u65e0\u4eba\u503c\u5b88\u4efb\u52a1\uff08286 min\uff09\u548c\u7528 Claude Code \u9ad8\u9891\u4ea4\u4e92\u7684\u4efb\u52a1\uff08211 min\uff09\uff0c\u4e00\u4e2a\u53ef\u80fd\u7684\u533a\u5206\u7ef4\u5ea6\u662f\u7528\u6237\u5728\u573a\u662f\u5426\u80fd\u589e\u52a0\u4ef7\u503c\uff08\u590d\u6742\u5ea6\u7b49\u5176\u4ed6\u56e0\u7d20\u672a\u88ab\u63a7\u5236\uff09\u3002\u76ee\u6807\u660e\u786e\u3001\u8def\u5f84\u786e\u5b9a\u7684\u4efb\u52a1\u9002\u5408\u59d4\u6258\uff1b\u9700\u8981\u54c1\u5473\u5224\u65ad\u3001\u65b9\u5411\u8c03\u6574\u7684\u4efb\u52a1\u9002\u5408\u534f\u4f5c\u3002\n\n\u8fd9\u5f15\u51fa\u4e00\u4e2a\u5047\u8bbe\uff08\u5c1a\u672a\u9a8c\u8bc1\uff09\uff1a\u7528\u6237\u5bf9\"\u5728\u573a\u4ef7\u503c\"\u7684\u5224\u65ad\u80fd\u529b\uff0c\u53ef\u80fd\u6bd4\u5de5\u5177\u9009\u62e9\u672c\u8eab\u66f4\u5f71\u54cd\u6548\u7387\u3002\u8fc7\u5ea6\u59d4\u6258\u548c\u8fc7\u5ea6\u4ecb\u5165\u90fd\u662f\u8fd9\u4e2a\u5224\u65ad\u4e0d\u591f\u6e05\u6670\u7684\u540e\u679c\u3002\n\n\u8fd9\u4e2a\u65b9\u5411\u7684\u5404\u4e2a\u7ec4\u6210\u90e8\u5206\u5df2\u7ecf\u5206\u522b\u5b58\u5728\uff0c\u4f46\u6ca1\u6709\u88ab\u62fc\u5230\u4e00\u8d77\uff1a\n\n> **\u81ea\u4e3b\u6027\u5206\u7ea7** \u2014 \u4ece Operator \u5230 Observer \u7684 5 \u7ea7\u6a21\u578b [10]\uff082025\uff09\uff0c\u81ea\u4e3b\u6027\u662f\u8bbe\u8ba1\u9009\u62e9\uff0c\u4e0e\u6a21\u578b\u80fd\u529b\u72ec\u7acb\u3002**\u4efb\u52a1\u7279\u5f81\u7ef4\u5ea6** \u2014 DeepMind Intelligent AI Delegation [11]\uff082026\uff09\u5b9a\u4e49\u4e86\u591a\u4e2a\u7ef4\u5ea6\uff08\u590d\u6742\u5ea6\u3001\u5173\u952e\u6027\u3001\u4e0d\u786e\u5b9a\u6027\u3001\u53ef\u9a8c\u8bc1\u6027\u3001\u53ef\u9006\u6027\u3001\u4e3b\u89c2\u6027\u7b49\uff09\u3002**\u59d4\u6258\u5224\u65ad\u6807\u51c6** \u2014 Cris Ryan Tan [12] \u63d0\u51fa\uff1a\u4efb\u52a1\u5b9a\u4e49\u7cbe\u786e + \u65b9\u6848\u8def\u5f84\u663e\u7136 + \u6210\u529f\u6807\u51c6\u786e\u5b9a + \u81ea\u5305\u542b \u2192 \u59d4\u6258\uff1b\u4efb\u4e00\u4e0d\u6ee1\u8db3 \u2192 \u534f\u4f5c\u3002**Pre-execution \u8def\u7531** \u2014 Triage [13] \u5bf9 SE \u4efb\u52a1\u8fdb\u884c\u6267\u884c\u524d\u5206\u6790\uff0c\u8def\u7531\u5230\u4e0d\u540c\u6a21\u578b\u80fd\u529b\u5c42\uff082026\uff09\u3002\n\n\u7f3a\u7684\u662f\u6700\u540e\u4e00\u6b65\u62fc\u63a5\uff1a\u63a5\u6536\u4e00\u6761\u81ea\u7136\u8bed\u8a00\u4efb\u52a1\u6307\u4ee4 \u2192 \u6309\u4e0a\u8ff0\u7ef4\u5ea6\u6253\u5206 \u2192 \u8f93\u51fa\u81ea\u4e3b\u7ea7\u522b\u63a8\u8350\u3002\u5f53\u524d Coding Agent \u7684\u81ea\u4e3b\u6027\u8981\u4e48\u56fa\u5b9a\u5728 prompt \u91cc\uff08Codex \u7684 \"keep going\"\u3001Claude Code \u7684 \"check with the user\"\uff09\uff0c\u8981\u4e48\u7531\u7528\u6237\u901a\u8fc7\u9879\u76ee\u6307\u4ee4\u8986\u76d6\uff08CLAUDE.md / AGENTS.md\uff09\uff0c\u6ca1\u6709\u7cfb\u7edf\u6839\u636e\u4efb\u52a1\u672c\u8eab\u7684\u7279\u5f81\u52a8\u6001\u63a8\u8350\u3002\n\n### 6.2 Context \u7b56\u7565\u80cc\u540e\u7684\u4fe1\u5ff5\u5dee\u5f02\n\n3.4 \u8282\u63cf\u8ff0\u4e86\u4e24\u79cd context \u7ba1\u7406\u65b9\u5f0f\u7684\u5bf9\u6bd4\uff1aClaude Code \u6bcf\u8f6e append \u540e\u518d\u8dd1\u4fee\u6539\u7ba1\u7ebf\uff0cCodex \u53ea append \u4e0d\u505a\u540e\u5904\u7406\u3002\u8fd9\u662f\u89c2\u5bdf\u5c42\u9762\u7684\u4e8b\u5b9e\u3002\u5f80\u4e0b\u4e00\u5c42\u662f\u4e00\u4e2a\u5c1a\u672a\u9a8c\u8bc1\u7684\u5f00\u653e\u95ee\u9898\uff1a**\u8fd9\u4e24\u79cd\u8bbe\u8ba1\u662f\u5426\u53cd\u6620\u4e86\u5bf9\"\u6a21\u578b\u4f1a\u53d8\u5f97\u591a\u5f3a\"\u7684\u4e0d\u540c\u8d4c\u6ce8\uff1f**\n\nClaude Code \u7684 5 \u5c42\u538b\u7f29\u7ba1\u7ebf\u3001Memory \u52a8\u6001\u6ce8\u5165\u3001MCP \u5b9e\u65f6\u66f4\u65b0\u2014\u2014\u90fd\u662f\u5728 prompt \u6784\u5efa\u5c42\u9762\u505a\u91cd\u5de5\u7a0b\uff0c\u8ba9\u6a21\u578b\u5728\u6bcf\u4e00\u6b65\u770b\u5230\"\u5f53\u524d\u6700\u4f18\" context\u3002\u8fd9\u6761\u8def\u5f84\u7684\u9690\u542b\u5047\u8bbe\u662f\uff1aharness \u80fd\u5e2e\u6a21\u578b\u770b\u5f97\u66f4\u6e05\u695a\uff0c\u7cbe\u5fc3\u7684 context \u7f16\u6392\u503c\u5f97\u4ed8\u51fa\u590d\u6742\u5ea6\u4ee3\u4ef7\u3002\n\nCodex \u7684 items \u53ea\u589e\u4e0d\u51cf\u3001instructions \u4e0d\u53d8\u2014\u2014\u628a\u5224\u65ad\u4ea4\u7ed9\u6a21\u578b\uff0c\u4e0d\u5728 per-turn \u5c42\u9762\u505a\u88c1\u526a\u3002\u77ed\u671f\u770b context \u4f1a\u7a00\u91ca\uff0c\u957f\u671f\u770b\u8fd9\u79cd\u514b\u5236\u53ef\u80fd\u662f\u4e00\u79cd\u4e0b\u6ce8\u2014\u2014\u968f\u7740\u6a21\u578b\u80fd\u529b\u589e\u957f\uff0c\u7cbe\u5fc3\u7684 context \u7f16\u6392\u4f1a\u9010\u6e10\u5931\u53bb\u8fb9\u9645\u6536\u76ca\u3002\u8fd9\u547c\u5e94\u4e86 Rich Sutton \u7684\u300c\u82e6\u6da9\u7684\u6559\u8bad\u300d\uff1a\u5728 AI \u7684\u5386\u53f2\u4e0a\uff0c\u80fd\u5229\u7528 scale \u7684\u65b9\u6cd5\u6700\u7ec8\u4f1a\u8d62\u8fc7\u4f9d\u8d56\u4eba\u7c7b\u5de5\u7a0b\u7684\u65b9\u6cd5\u3002\n\n\u4e24\u79cd\u8d4c\u6ce8\u90fd\u6ca1\u6709\u88ab\u9a8c\u8bc1\u8fc7\uff1a\u5982\u679c\u6a21\u578b\u80fd\u529b\u589e\u957f\u901f\u5ea6\u653e\u7f13\uff0cClaude Code \u7684\u91cd\u5de5\u7a0b\u53ef\u80fd\u957f\u671f\u9886\u5148\uff1b\u5982\u679c\u6a21\u578b\u80fd\u529b\u7ee7\u7eed\u5feb\u901f\u589e\u957f\uff0cCodex \u7684\u514b\u5236\u53ef\u80fd\u5728\u672a\u6765\u51e0\u4ee3\u6a21\u578b\u4e0a\u663e\u793a\u51fa\u4f18\u52bf\u3002\u8fd9\u662f\u4e00\u4e2a\u9700\u8981\u65f6\u95f4\u3001\u800c\u975e\u6e90\u7801\u80fd\u56de\u7b54\u7684\u95ee\u9898\u3002\n\nyage [7] \u901a\u8fc7\u6e90\u7801\u53cd\u5411\u5206\u6790\u91cf\u5316\u4e86\u7cbe\u7ec6\u5316\u8def\u7ebf\u7684\u7ef4\u62a4\u6210\u672c\uff1a77% \u7684\u5de5\u5177\u76f8\u5173\u7f13\u5b58\u5931\u6548\u6765\u81ea tool description \u53d8\u5316\u3001prompt \u672b\u5c3e\u7684\u7a7a tool_result \u89e6\u53d1 capybara \u6a21\u578b\u91c7\u6837 stop sequence \u7ea6 10%\uff08A/B 21/200 vs 0/200\uff09\u3001\u7cfb\u7edf\u56e0\u6b64\u9700\u8981 sticky-on latch \u673a\u5236\u907f\u514d\u4e22\u5931 50-70K tokens \u7684\u7f13\u5b58\u3001\u591a\u5c42\u89c4\u8303\u5316\u7ba1\u7ebf\uff08\u4f5c\u8005\u5f62\u5bb9\u4e3a \"inherently fragile\"\uff09\u3001SDK \u7684 `BetaMessageStream` \u56e0 `partialParse()` \u5728\u6bcf\u4e2a `input_json_delta` \u4e0a\u7684 O(n\u00b2) \u884c\u4e3a\u88ab\u7ed5\u8fc7\u91cd\u5199\u3002\n\n### 6.3 \u6469\u64e6\u7684\u771f\u6b63\u6765\u6e90\uff1aharness \u5bf9\u6a21\u578b\u7684\u4e0d\u900f\u660e\uff08\u4f5c\u8005\u7684\u4e00\u4e2a claim\uff09\n\n> \u672c\u8282\u662f\u4f5c\u8005\u7684\u4e2a\u4eba\u89c2\u70b9\uff0c\u4e0d\u662f\u6e90\u7801\u53ef\u9a8c\u8bc1\u7684\u7ed3\u8bba\u3002\n\n3.5 \u8282\u89c2\u5bdf\u5230 Claude Code \u7684\u957f turn \u6709\"\u7ec8\u6b62\u98ce\u9669\"\u3002\u987a\u7740\u6e90\u7801\u5f80\u4e0b\u6316\uff0c\u4e00\u4e2a\u731c\u60f3\u662f\uff1a\u6469\u64e6\u4e0d\u6765\u81ea\"\u8ffd\u52a0+\u5904\u7406 vs \u53ea\u8ffd\u52a0\"\u8fd9\u4e2a\u8868\u5c42\u5dee\u5f02\uff0c\u800c\u6765\u81ea **harness \u7684\u7cbe\u7ec6\u64cd\u4f5c\u5bf9\u6a21\u578b\u4e0d\u53ef\u89c1**\uff0c\u4e0e prompt \u7684\u514b\u5236\u6027\uff08\"check with user before proceeding\"\uff09\u8026\u5408\u7684\u7ed3\u679c\uff1a\n>\n> - **harness \u5c42\u4e0d\u900f\u660e**\uff1a5 \u5c42\u4fee\u6539\u7ba1\u7ebf\u3001Memory \u52a8\u6001\u6ce8\u5165\u3001MCP \u6307\u4ee4\u5b9e\u65f6\u66f4\u65b0\u3001git status \u5b9e\u65f6\u66f4\u65b0\u2014\u2014\u8fd9\u4e9b\u64cd\u4f5c\u53d1\u751f\u65f6\uff0c\u6587\u4e2d\u672a\u89c1\u6a21\u578b\u53ef\u663e\u5f0f\u83b7\u77e5\u8fd9\u4e9b\u6539\u52a8\u7684\u673a\u5236\uff08\u9700\u6e90\u7801/\u534f\u8bae\u8fdb\u4e00\u6b65\u9a8c\u8bc1\uff09\uff0c\u6a21\u578b\u53ef\u80fd\u4e0d\u6e05\u695a\u81ea\u5df1\u7684 context \u91cc\u4ec0\u4e48\u88ab\u88c1\u6389\u4e86\u3001\u4ec0\u4e48\u88ab\u6362\u6210\u4e86\u6458\u8981\u3001\u4ec0\u4e48\u65b0\u6587\u4ef6\u88ab\u6ce8\u5165\u4e86\u3002\n> - **prompt \u5c42\u514b\u5236**\uff1aA \u5382 prompt \u8981\u6c42\u6a21\u578b\u5728\u4e0d\u786e\u5b9a\u65f6\u505c\u4e0b\u6765\u786e\u8ba4\u3002\n>\n> \u4e24\u8005\u53e0\u52a0\uff1a\u6a21\u578b\u6bcf\u4e00\u6b65\u770b\u5230\u7684 context \u90fd\u53ef\u80fd\u53d1\u751f\u53d8\u5316\uff08\u56e0\u4e3a harness \u6bcf\u8f6e\u5904\u7406\uff09+ prompt \u8981\u5b83\u8c28\u614e \u2192 \u6a21\u578b\u66f4\u503e\u5411\u4e8e\u8f93\u51fa \"stop\"\uff0c\u628a\u51b3\u7b56\u6743\u4ea4\u7ed9\u7528\u6237\u3002Ralph Wiggum \u8fd9\u7c7b\u5de5\u5177\u5728 harness \u5c42\u62e6\u622a stop \u4fe1\u53f7\uff0c\u4f5c\u8005\u5224\u65ad\u662f\"\u6a21\u578b\u53c2\u6570\u5916\u7684\u624b\u6bb5\"\uff0c\u6cbb\u6807\u4e0d\u6cbb\u672c\u3002\n>\n> **\u4f5c\u8005\u7684 claim**\uff1a\u5982\u679c harness \u4e2d\u7684\u6240\u6709\u64cd\u4f5c\u90fd\u5bf9\u6a21\u578b\u53ef\u611f\u77e5\u3001\u53ef\u63a7\u5236\u3001\u53ef\u56de\u6eaf\uff0c\u6469\u64e6\u611f\u4f1a\u5927\u5e45\u964d\u4f4e\u3002\u5177\u4f53\u610f\u5473\u7740\uff1acontext \u7684\u6539\u52a8\u5bf9\u6a21\u578b\u53ef\u89c1\uff08\u54ea\u4e9b item \u88ab\u88c1\u4e86\u3001\u54ea\u4e9b\u88ab\u6458\u8981\u4e86\uff09\u3001\u6a21\u578b\u80fd\u4e3b\u52a8\u8bf7\u6c42\u6216\u62d2\u7edd\u8fd9\u4e9b\u64cd\u4f5c\u3001\u6a21\u578b\u80fd\u67e5\u8be2\u8fc7\u5f80 context \u72b6\u6001\u3002\u8fd9\u662f\u4e00\u4e2a harness \u8bbe\u8ba1\u65b9\u5411\u3002\u5c31\u4f5c\u8005\u76ee\u524d\u6240\u89c1\u7684\u4ea7\u54c1\u8c03\u7814\u8303\u56f4\u5185\uff0c\u6ca1\u6709 Coding Agent \u660e\u786e\u5f80\u8fd9\u4e2a\u65b9\u5411\u8d70\uff08\u9700\u66f4\u5e7f\u6cdb\u9a8c\u8bc1\uff09\u3002\n\n### 6.4 \u6548\u679c\u4fdd\u8bc1\uff1a\u81ea\u6211\u8fdb\u5316\u7684 Agent\n\n\u672c\u6587\u5206\u6790\u7684\u56db\u79cd\u6846\u67b6\u90fd\u6ca1\u6709\u89e3\u51b3\u4e00\u4e2a\u95ee\u9898\uff1a**Agent \u8dd1\u4e86\u5f88\u4e45\uff0c\u4f46\u8dd1\u504f\u4e86\u600e\u4e48\u529e\uff1f** \u7eed\u822a\u8d8a\u5f3a\uff0c\u8fd9\u4e2a\u98ce\u9669\u8d8a\u5927\u3002\n\n\u4e00\u79cd\u503c\u5f97\u5173\u6ce8\u7684\u65b9\u5411\u662f [Hermes Agent](https://github.com/NousResearch/hermes-agent) [8] \u7684\u95ed\u73af\u5b66\u4e60\u7cfb\u7edf\uff08\u8be6\u89c1 `hermes-agent-learning-loop.md`\uff09\uff1aAgent \u5b8c\u6210\u4efb\u52a1\u540e\uff0c\u540e\u53f0\u5ba1\u67e5\u7ebf\u7a0b\u5224\u65ad\u662f\u5426\u6709\u53ef\u590d\u7528\u7684\u65b9\u6cd5\u5e76\u81ea\u52a8\u521b\u5efa skill\uff1b\u4f7f\u7528 skill \u65f6\u53d1\u73b0\u7f3a\u9677\u53ef\u7acb\u5373 patch\uff1b\u6267\u884c\u8bb0\u5f55\u88ab\u538b\u7f29\u4e3a RL \u8bad\u7ec3\u6570\u636e\u7528\u4e8e\u6539\u8fdb\u6a21\u578b\u3002\u8fd9\u662f\u4ece\"\u8dd1\u5f97\u4e45\"\u5230\"\u6bcf\u6b21\u8dd1\u5b8c\u90fd\u53d8\u5f97\u66f4\u597d\"\u7684\u67b6\u6784\u6f14\u8fdb\u3002\u4f46\u81ea\u6211\u6539\u8fdb\u7684 Agent \u5982\u4f55\u4fdd\u8bc1\u6539\u8fdb\u65b9\u5411\u7684\u6b63\u786e\u6027\uff0c\u4ecd\u662f\u5f00\u653e\u95ee\u9898\u3002\n\n### 6.5 \u5b9a\u5236 Harness\n\n\u7406\u89e3\u4e86 prompt \u63a7\u5236\u81ea\u4e3b\u6027\u3001\u67b6\u6784\u63a7\u5236\u53ef\u63a7\u6027\u3001context \u7b56\u7565\u51b3\u5b9a\u7eed\u822a/\u8d28\u91cf\u53d6\u820d\u4e4b\u540e\uff0c\u7528\u6237\u53ef\u4ee5\u57fa\u4e8e\u5f00\u6e90 harness \u7ec4\u88c5\u81ea\u5df1\u7684\u63a7\u5236\u7b56\u7565 [7]\u3002\u8fd9\u6bd4\u9009\u62e9\u73b0\u6709\u4ea7\u54c1\u66f4\u7075\u6d3b\uff0c\u4e5f\u66f4\u9700\u8981\u5bf9 Agent \u673a\u5236\u7684\u6df1\u5165\u7406\u89e3\u3002\n\n## \u5f15\u7528\n\n- [1] \u9ec4\u54f2\u5a01\u7b49, [OpenClaw \u5982\u4f55\u7cfb\u7edf\u6027\u8282\u7701 Token](https://www.zhihu.com/question/2011944622507700619/answer/2014141275079738495), \u77e5\u4e4e, 2026\n- [2] agentway.dev, [Comparative Harness Notes \u7b2c 3 \u7ae0: Query Loop \u5bf9\u7167 Thread\u3001Rollout \u4e0e State](https://harness-books.agentway.dev/book2-comparing/chapter-03-loop-thread-and-rollout.html), 2026\n- [3] [Claude Code](https://github.com/anthropics/claude-code) 2.1.88 \u6e90\u7801\n- [4] [Codex CLI (codex-rs)](https://github.com/openai/codex) \u6e90\u7801\n- [5] [understand-anything](https://github.com/Lum1104/Understand-Anything) Claude Code plugin\n- [6] [OpenClaw](https://github.com/openclaw/openclaw) \u4e2a\u4eba AI \u4ee3\u7406\u5e73\u53f0\n- [7] yage, yage.ai \u2014 [\u5173\u4e8e OpenClaw](https://yage.ai/openclaw.html)\uff08\"\u5de5\u5177\u4f1a\u8fc7\u6c14\uff0c\u5bf9\u5de5\u5177\u672c\u8d28\u7684\u7406\u89e3\u4e0d\u4f1a\"\uff09/ [Claude Code \u7684\u5de5\u7a0b\u6210\u672c](https://yage.ai/share/claude-code-engineering-cost-20260331.html)\n- [8] [Hermes Agent](https://github.com/NousResearch/hermes-agent), Nous Research \u2014 \u95ed\u73af\u5b66\u4e60\u7cfb\u7edf\uff08skill \u81ea\u521b\u5efa + trajectory \u2192 RL\uff09\n- [9] [Ralph Wiggum](https://github.com/anthropics/claude-code/tree/main/plugins/ralph-wiggum), Anthropic \u5b98\u65b9 Claude Code plugin \u2014 Stop Hook \u9a71\u52a8\u7684\u81ea\u5faa\u73af\u957f\u7a0b\u6267\u884c\n- [10] Lazar et al., [Levels of Autonomy for AI Agents](https://arxiv.org/abs/2506.12469), 2025 \u2014 5 \u7ea7\u81ea\u4e3b\u6027\u6846\u67b6\uff08Operator \u2192 Observer\uff09\uff0c\u81ea\u4e3b\u6027\u4e0e\u80fd\u529b\u72ec\u7acb\n- [11] Terzis et al., [Intelligent AI Delegation](https://arxiv.org/abs/2602.11865), Google DeepMind, 2026 \u2014 \u52a8\u6001\u8bc4\u4f30 + \u81ea\u9002\u5e94\u4efb\u52a1\u91cd\u5206\u914d + \u4fe1\u4efb\u6821\u51c6\u6846\u67b6\n- [12] Cris Ryan Tan, [AI Coding Workflows: Delegating vs Leveraging](https://www.crisryantan.com/blog/ai-coding-workflows/), 2025 \u2014 \u59d4\u6258 vs \u534f\u4f5c\u7684\u5b9e\u64cd\u5224\u65ad\u6807\u51c6\n- [13] [Triage: Routing SE Tasks to Cost-Effective LLM Tiers](https://arxiv.org/abs/2604.07494), 2026 \u2014 Pre-execution \u4efb\u52a1\u5206\u6790 \u2192 \u6a21\u578b\u80fd\u529b\u5c42\u8def\u7531\n\n---\n\n*Claude Code \u4fa7\u5f15\u7528\uff08`file.ts:line`\uff09\u57fa\u4e8e\u672c\u5730\u6e90\u7801 [3]\uff1bCodex \u4fa7\u5f15\u7528\uff08`file.rs:line`\uff09\u57fa\u4e8e\u672c\u5730\u6e90\u7801 [4]\uff1b\u7b2c\u4e09\u65b9\u5f15\u7528 [5][6] \u57fa\u4e8e\u672c\u5730\u5b89\u88c5\u7248\u672c\uff0c\u672a\u505a\u4e0a\u6e38\u7248\u672c\u9501\u5b9a\u3002*\n";

marked.setOptions({ gfm: true, breaks: false });

// Render
let html = marked.parse(md);

// Post-process: inject tag styles
html = html.replace(/\[核心概念\]/g, '<span class="tag tag-concept">核心概念</span>');
html = html.replace(/\[设计决策\]/g, '<span class="tag tag-decision">设计决策</span>');
html = html.replace(/\[权衡\]/g, '<span class="tag tag-tradeoff">权衡</span>');
html = html.replace(/\[可借鉴\]/g, '<span class="tag tag-reuse">可借鉴</span>');
html = html.replace(/\[陷阱\]/g, '<span class="tag tag-tradeoff">陷阱</span>');

// Post-process: convert [1], [2] etc. to clickable footnote links
html = html.replace(/\[(\d+)\]/g, function(match, num) {
  // Don't convert if inside an <a> tag or markdown link (already rendered)
  return '<a href="#ref-' + num + '" class="ref-link">[' + num + ']</a>';
});

document.getElementById('content').innerHTML = html;

// Add ids to reference list items so footnote links can jump to them
(function() {
  const content = document.getElementById('content');
  const refSection = Array.from(content.querySelectorAll('h2')).find(h => h.textContent.trim() === '引用');
  if (!refSection) return;
  let el = refSection.nextElementSibling;
  while (el) {
    if (el.tagName === 'UL' || el.tagName === 'OL') {
      el.querySelectorAll('li').forEach(li => {
        const m = li.textContent.match(/^\[(\d+)\]/);
        if (m) li.id = 'ref-' + m[1];
      });
      break;
    }
    if (el.tagName === 'H2') break;
    el = el.nextElementSibling;
  }
})();

// Add IDs to headings and build nav
const headings = document.querySelectorAll('#content h2, #content h3');
const nav = document.getElementById('nav');
headings.forEach((h, i) => {
  h.id = 'section-' + i;
  const a = document.createElement('a');
  a.className = 'nav-item';
  a.href = '#section-' + i;
  const num = document.createElement('span');
  num.className = 'nav-num';
  const text = h.textContent;
  const m = text.match(/^([一二三四五六七八九十]+)[、.．]/) || text.match(/^(\d+\.\d+)\s/) || text.match(/^模式\s*(\d+)/);
  num.textContent = m ? m[1] : '·';
  a.appendChild(num);
  const label = text.replace(/^[一二三四五六七八九十]+[、.．]\s*/, '').replace(/^\d+\.\d+\s*/, '').replace(/^模式\s*\d+[：:]\s*/, '');
  a.appendChild(document.createTextNode(label.length > 20 ? label.slice(0,20)+'...' : label));
  if (h.tagName === 'H3') { a.style.paddingLeft = '36px'; num.style.fontSize = '10px'; num.style.width = '18px'; num.style.height = '18px'; }
  nav.appendChild(a);
});

// Scroll spy
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      const link = nav.querySelector('a[href="#'+e.target.id+'"]');
      if (link) link.classList.add('active');
    }
  });
}, { rootMargin: '-20% 0px -70% 0px' });
headings.forEach(h => obs.observe(h));

// Highlight code blocks
hljs.highlightAll();

// Post-process: find <!-- SPLIT:Left|Right --> markers and arrange
// the next two <pre> blocks side-by-side with labels
(function() {
  const content = document.getElementById('content');
  // HTML comments become comment nodes after marked.parse
  // But marked strips them. So we look for the raw text pattern in innerHTML.
  const splitRe = /<!--\s*SPLIT:(.*?)\|(.*?)\s*-->/g;
  let match;
  const htmlStr = content.innerHTML;
  const splits = [];
  while ((match = splitRe.exec(htmlStr)) !== null) {
    splits.push({ full: match[0], left: match[1], right: match[2] });
  }
  // Also find END_SPLIT
  const endRe = /<!--\s*END_SPLIT\s*-->/g;

  if (splits.length === 0) return;

  // For each SPLIT marker, find the two consecutive <pre> blocks after it
  // and wrap them in a side-by-side grid
  splits.forEach(sp => {
    // Insert a placeholder div that we can find in the DOM
    const placeholder = '<div class="split-marker" data-left="'+sp.left+'" data-right="'+sp.right+'"></div>';
    content.innerHTML = content.innerHTML.replace(sp.full, placeholder);
  });
  // Remove END_SPLIT markers
  content.innerHTML = content.innerHTML.replace(endRe, '');

  // Now find each .split-marker and rearrange DOM
  content.querySelectorAll('.split-marker').forEach(marker => {
    const leftLabel = marker.dataset.left;
    const rightLabel = marker.dataset.right;

    // Find the next two <pre> elements after the marker
    let el = marker.nextElementSibling;
    let pres = [];
    while (el && pres.length < 2) {
      if (el.tagName === 'PRE') pres.push(el);
      else if (el.tagName === 'H2' || el.tagName === 'H3') break; // stop at next heading
      el = el.nextElementSibling;
    }

    if (pres.length < 2) return;

    // Build side-by-side container
    const grid = document.createElement('div');
    grid.className = 'side-by-side';

    const leftDiv = document.createElement('div');
    const rightDiv = document.createElement('div');

    const ll = document.createElement('div');
    ll.className = 'side-label claude';
    ll.textContent = leftLabel;
    const rl = document.createElement('div');
    rl.className = 'side-label codex';
    rl.textContent = rightLabel;

    leftDiv.appendChild(ll);
    leftDiv.appendChild(pres[0]);
    rightDiv.appendChild(rl);
    rightDiv.appendChild(pres[1]);

    grid.appendChild(leftDiv);
    grid.appendChild(rightDiv);

    marker.parentNode.replaceChild(grid, marker);
  });
})();
</script>
