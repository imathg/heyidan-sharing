<script>
const md = "# Coding Agent 的续航力差异 — Claude Code 与 Codex 的源码级对比分析\n\n> 基于 Claude Code 2.1.88 与 Codex CLI (codex-rs) 的源码阅读，分析同类 Coding Agent 在上下文管理、执行续航和用户交互模型上的设计分歧。\n\n\n---\n\n## 一、同一个任务，3 分钟 vs 5 小时\n\n你让 Codex 跑一个批量数据处理任务，发完指令去吃饭，回来时任务已经跑了 4.8 小时、393 步，结果写好了。Claude Code 跑类似的批量任务时，前台 agent 通常在几分钟内暂停等待确认，需要通过后台 agent 才能实现长程无人值守。**同样是 Coding Agent，续航力为什么差这么多？** 具体表现为三个方面：\n\n1. **单 turn 续航** — 同等规模的任务，Claude 倾向于数步后暂停确认，Codex 持续执行直到完成。\n2. **\"请继续\"的效果** — 在 Codex 中可以有效延长执行，在 Claude Code 中反而中断当前工作流。\n3. **单步执行质量** — 体感上 Claude 对项目上下文的把握更精准，但成因尚不明确（模型能力、prompt 工程、harness 设计均可能贡献）。\n\n从源码分析来看，这三个表现可能指向同一个架构层面的分歧：**两者选择了不同的 context 管理策略**。Claude Code 每轮重新编排 context，Codex 线性追加 context。前者的机制有利于维持单步 context 质量，但也引入了更多 harness 级别的执行摩擦；后者的机制减少了摩擦，但后期 context 密度会下降。本文从源码层面梳理这些机制差异，并提炼三种延长 Agent 运行时间的设计模式。需要说明的是，体感差异的成因是多维度的（模型能力、prompt 工程、harness 设计、API 协议等），本文聚焦 harness 和 prompt 层面可从源码验证的部分。\n\n### 1.1 差异有多大？\n\n下面的 GIF 是一次实际的 Codex 长程执行——第一个 turn 停下后，通过\"请继续\"启动第二个 turn 继续工作：\n\n![Codex 长程执行 + \"请继续\"示例](assets/codex-long-running.gif)\n\n以下是笔者本地 session 历史的统计（度量方式：agent 活动事件的时间窗口，内部 > 30min 空隙截断，仅保留 ≥ 1min 的 turn。笔者倾向于把无人值守批量任务交给 Codex、交互式场景交给 Claude Code，任务分配不同，非控制实验）：\n\n**前台单 turn 自主执行时长**（同口径对比，均为前台 agent、无用户消息介入）：\n\n<!-- SPLIT:Claude Code (975 turns)|Codex (925 turns) -->\n\n```\n  1-3 min:   92.6%\n  3-10 min:   6.6%\n  10+ min:    0.7%\n\n  P50:  1.4 min\n  P90:  2.6 min\n  Max: 10.2 min\n```\n\n```\n  1-3 min:   46.4%\n  3-10 min:  33.9%\n  10+ min:   19.7%\n\n  P50:  3.4 min\n  P90: 18.8 min\n  Max: 286 min (4.8h, 393 steps)\n```\n\n<!-- END_SPLIT -->\n\n**长程运行模式不同**：Codex 在前台单 turn 无人值守数小时（典型案例：286 min \"盯着直到写完飞书表\"、263 min \"直到 v54 报告生成\"）。Claude Code 的前台单 turn 集中在 1-3 分钟，但通过后台 agent（`run_in_background`）支持长程任务——后台 agent 最长密集执行 211 min（3.5h），P90 = 41 min。\n\n\n<details>\n<summary><strong>分析对象与引用说明</strong></summary>\n\n本文对比四种长程执行范式：\n\n| 范式 | 代表 | 来源 |\n|------|------|------|\n| 单循环 + 谨慎退出 | [Claude Code](https://github.com/anthropics/claude-code) 2.1.88 | Anthropic 官方 CLI |\n| 双队列 + 持续执行 | [Codex CLI](https://github.com/openai/codex) (codex-rs) | OpenAI 官方 CLI |\n| 流水线 + 子代理扇出 | [understand-anything](https://github.com/Lum1104/Understand-Anything) | 第三方 Claude Code plugin |\n| 多 Session 持久体 | [OpenClaw](https://github.com/openclaw/openclaw) | 开源 AI 代理平台 |\n\nunderstand-anything 和 OpenClaw 作为第三方生态的代表被引入，展示在官方 harness 之上社区如何解决长程运行问题。\n\n**Skill 与 Plugin 的区别**：Skill 是一个 SKILL.md 文件（prompt 模板），通过 `/skill-name` 触发。Plugin 是 Skill 的超集，可同时提供多个 Skill、Hook 和 MCP 服务器（`builtinPlugins.ts:9`）。understand-anything 注册为 Plugin，核心功能通过内部多个 Skill 和 Agent 定义实现。\n\n</details>\n\n---\n\n## 二、四种 Agent Loop 的驱动方式\n\n先从全局视角理解四种框架的循环驱动方式，再逐个深入差异。这四种设计覆盖了当前 Coding Agent 的主要架构流派。\n\n### 2.1 循环骨架相同\n\n两者的 Agent Loop 核心判定逻辑相似——都是\"有 tool_call 就继续，没有就停\"。但循环内部的 context 构建方式、退出前的干预机制、以及循环外部的 prompt 和 session 设计存在显著分歧。\n\n<!-- SPLIT:Claude Code (query.ts:307)|Codex (codex.rs:6202) -->\n\n```\nwhile (true) {\n  ① 组装 system prompt (15 section)\n    + 注入 CLAUDE.md 到 messages[0]\n    + 5 层压缩管线裁剪历史消息\n    + 异步注入 Memory (Sonnet sideQuery)\n\n  ② 流式调用 Anthropic Messages API\n\n  ③ 收集 tool_use blocks\n    if (tool_use > 0) → needsFollowUp = true\n\n  ④ 执行 tools\n\n  ⑤ if (!needsFollowUp) {\n      Stop Hook → 可注入 error 重试\n      Token Budget → +500k 可强制继续\n      return completed   ← 正常退出\n    }\n\n  ⑥ if (maxTurns 超限)\n      return max_turns\n      // 交互模式通常不设; 子代理默认 200\n\n  ⑦ autoCompact (有 circuit breaker)\n    continue\n}\n```\n\n```\nloop {\n  ① drain pending_input 队列\n    (用户在执行期间发的消息在此处消费)\n\n  ② 线性追加 items 到 ContextManager\n    instructions 不变\n\n  ③ 流式调用 OpenAI Responses API\n    (WebSocket 增量: 只发 delta + previous_response_id)\n\n  ④ 收集 tool_call\n    if (has_tool_call) → model_needs_follow_up = true\n\n  ⑤ needs_follow_up =\n      model_needs_follow_up\n      || has_pending_input   ← 队列非空也继续\n\n  ⑥ if (token 超限 && needs_follow_up)\n      compact → continue    ← 无 circuit breaker\n\n  ⑦ if (!needs_follow_up) {\n      Stop Hook → 可注入 continuation_prompt\n      break                 ← 正常退出\n    }\n    continue\n}\n```\n\n<!-- END_SPLIT -->\n\n三个差异点的位置标注：\n- **差异1 (上下文理解)**: 步骤 ① — Claude 的 15 section + Memory 预取 vs Codex 的扁平 instructions + 线性追加\n- **差异2 (续航)**: 步骤 ⑤⑥⑦ — pending_input 队列、compact 策略、Stop Hook 行为\n- **差异3 (用户输入)**: 步骤 ① — Codex 有 drain pending_input，Claude 无等价机制\n\n---\n\n### 2.2 四种框架如何驱动执行\n\n**第一组：两大官方 Coding Agent**\n\n<!-- SPLIT:Claude Code — 单循环 + 谨慎退出|Codex — 双队列 + 持续执行 -->\n\n```\nwhile (true) {              // query.ts:307\n  streamAPI(messages)        // Messages API\n  extractToolUse(response)\n  if (toolUse > 0)\n    needsFollowUp = true     // query.ts:832\n  executeTools()\n\n  if (!needsFollowUp) {      // query.ts:1062\n    handleStopHooks()\n    → blockingErrors → continue\n    → tokenBudget < 90% → continue\n    return completed         // ← 正常退出\n  }\n  if (maxTurns exceeded)\n    return max_turns         // 子代理默认 200\n  autoCompact(if needed)     // 有 circuit breaker\n  continue\n}\n```\n\n```\nloop {                       // codex.rs:6202\n  drain_pending_input()      // ← 队列模型独有\n  record(pending)\n\n  streamAPI(prompt)          // Responses API + WS\n  if (has_tool_call)\n    model_needs_follow_up = true\n\n  needs_follow_up =\n    model_needs_follow_up\n    || has_pending_input     // codex.rs:6293\n\n  if (token_limit && needs_follow_up)\n    auto_compact() → continue  // 无 circuit breaker\n\n  if (!needs_follow_up) {    // codex.rs:6331\n    run_stop_hooks()\n    → should_block → continue  // 强制续航\n    break                    // ← 正常退出\n  }\n  continue\n}\n```\n\n<!-- END_SPLIT -->\n\n**第二组：第三方生态的长程执行方案**\n\n<!-- SPLIT:understand-anything — 流水线 + 子代理扇出|OpenClaw — 多 Session 持久体 -->\n\n```\nSKILL.md 主控:\n\nPhase 0: preflight()          // 增量/全量判断\n  ↓\nPhase 1: dispatch(scanner)    // 子 agent 独立 context\n  → scan-result.json          // 磁盘传递\n  ↓\nPhase 2: batch(20-30 files)\n  dispatch(analyzer) × 5      // 并行扇出\n  → batch-N.json\n  merge-batch-graphs.py       // 确定性脚本合并\n  ↓\nPhase 3: dispatch(reviewer)   // 质量审查\n  ↓\nPhase 4: dispatch(arch)       // 分层\n  ↓\nPhase 5: dispatch(tour)       // 导览\n  ↓\nPhase 6: validate.cjs         // 确定性校验\n  ↓\nPhase 7: → knowledge-graph.json\n\n每个 Phase 输出在磁盘上，\ncompact 不影响已完成工作。\n```\n\n```\nGateway 常驻 (port:18789):\n\n├─ 收到消息 → 启动 Session:\n│    read AGENTS.md, SOUL.md\n│    execute task\n│    write memory/YYYY-MM-DD.md\n│    session 结束\n│\n├─ Heartbeat → 新 Session:\n│    read HEARTBEAT.md\n│    check email/calendar\n│    有事 → 通知; 无事 → OK\n│\n├─ Cron → isolated Session:\n│    独立 context\n│    结果投递到 channel\n│\n└─ Sub-Agent Spawn:\n     sessions_spawn()\n     嵌套 5 层, 并发 8 个\n     完成 → announce 回父 session\n\nCompaction 前 silent memory flush:\n接近窗口 → 先写磁盘 → 再压缩\n```\n\n<!-- END_SPLIT -->\n\n### 2.3 模型想停时 harness 怎么做\n\n| 维度 | Claude Code | Codex | understand-anything | OpenClaw |\n|------|-------------|-------|---------------------|----------|\n| **继续信号** | 仅 tool_use | tool_use OR pending_input | SKILL.md 下一步指令 | 下一条消息 / heartbeat |\n| **Token 满了** | compact，3 次失败后停止 | compact → continue，未发现显式上限 | 子代理各自管理 | auto-compact + memory flush |\n| **Context 压力** | 单 context，5 层管线主动裁剪 | 单 context，线性增长 | 子代理各自独立 context | 每 session 独立 |\n| **步数限制** | 子代理默认 200 | 未发现显式上限 | 固定 8 Phase | session timeout 600s |\n\n### 2.4 续航差异的决策树\n\n四种 loop 的核心区别不在循环本身，而在 **\"模型想停的时候，harness 怎么做\"**：\n\n```\n模型发出 end_turn（不再调用 tool）\n         │\n    ┌────┴──────────────────────────────────────────────┐\n    │                                                    │\n  Claude Code                                         Codex\n    │                                                    │\n    ▼                                                    ▼\n  Stop Hook?                                          pending_input?\n  (默认无配置)                                         (队列非空 → 强制续航)\n    │                                                    │\n    ▼                                                    ▼\n  Token Budget?                                       Stop Hook?\n  (+500k opt-in)                                      (可注入 continuation_prompt)\n    │                                                    │\n    ▼                                                    ▼\n  return completed                                    break（仅当两者都放行）\n    │\n    │\n  understand-anything                                 OpenClaw\n    │                                                    │\n    ▼                                                    ▼\n  不存在这个问题：                                     不存在这个问题：\n  SKILL.md 每个 Phase 结尾                             每个 session 天然有终点，\n  直接衔接下一步操作指令，                              \"持续\"靠启动下一个 session。\n  模型没有决策空间来判断                                Heartbeat / Cron 驱动\n  \"是否应该停下来\"。                                    下一轮唤醒。\n```\n\n<details>\n<summary><strong>understand-anything 如何规避\"模型想停\"的问题？</strong></summary>\n\n关键在于 SKILL.md 的写法——每个 Phase 的结尾直接衔接下一个 Phase 的操作指令，模型没有\"是否应该停下来确认\"的决策空间。以 Phase 1 → Phase 2 的衔接为例（`SKILL.md:104-134`）：\n\n```\nPhase 1 — SCAN\n...\nAfter the subagent completes, read\n  $PROJECT_ROOT/.understand-anything/intermediate/scan-result.json\nto get: project name, description, languages, file list...\n\nStore importMap in memory as $IMPORT_MAP for use in Phase 2.\n                                               ← 直接引出 Phase 2\n\nPhase 2 — ANALYZE\nBatch the file list from Phase 1 into groups of 20-30 files each.\nFor each batch, dispatch a subagent using the file-analyzer agent\ndefinition. Run up to 5 subagents concurrently.\n                                               ← 无\"是否继续？\"检查点\nAfter ALL batches complete, run the merge-and-normalize script:\n  python <SKILL_DIR>/merge-batch-graphs.py $PROJECT_ROOT\n                                               ← 直接衔接 Phase 3\n```\n\n每个 Phase 以\"读取上一步输出 → 执行操作 → 写入结果\"的固定模式衔接。模型在任何一步都知道下一步该做什么，不需要判断\"是否应该继续\"。\n\n两种持续执行策略的区别：Codex 告诉模型一个**目标**（\"完成才停\"），由模型自主判断何时达标；SKILL.md 给模型一个**步骤序列**（Phase 0 → 7），消除了判断空间本身。\n\n</details>\n\n---\n\n## 三、每次迭代发了什么、变了什么\n\n上一节看的是 loop 骨架。这一节聚焦更细的粒度：**每次迭代实际发给模型的 context 由哪些部分构成？连续两次迭代之间，context 发生了什么变化？**\n\n### 3.1 Claude Code 的请求：分层组装 + 每轮裁剪\n\n`query.ts:659-662` 是发出 API 请求的那一行。一次请求包含三部分：\n\n```\ndeps.callModel({\n    messages: prependUserContext(messagesForQuery, userContext),\n    systemPrompt: fullSystemPrompt,\n    tools: toolUseContext.options.tools,\n})\n```\n\n展开看每部分是怎么构造的：\n\n```\n┌─ system 参数 ────────────────────────────────────────────────────┐\n│                                                                   │\n│  静态层 (scope:'global', 跨用户缓存)                             │\n│    Intro / System / Doing Tasks / Actions / Using Your Tools /   │\n│    Tone and Style / Output Efficiency                            │\n│  ── SYSTEM_PROMPT_DYNAMIC_BOUNDARY ──                            │\n│  动态层 (每 session 计算, memoized)                              │\n│    Session Guidance / Memory 行为指令 / Env Info / Language /    │\n│    Output Style / Token Budget                                   │\n│  每轮重算层 (DANGEROUS_uncached)                                 │\n│    MCP Instructions (MCP 服务器可能连接/断开)                     │\n│  尾部追加 (appendSystemContext)                                  │\n│    Git Status: branch, recent commits, working tree              │\n│                                                                   │\n│  → 15+ section, 分层组装, 有 cache 断点                          │\n└───────────────────────────────────────────────────────────────────┘\n\n┌─ messages 参数 ──────────────────────────────────────────────────┐\n│                                                                   │\n│  messages[0]:                                                     │\n│    <system-reminder>                                              │\n│      CLAUDE.md 内容 (Managed→User→Project→Local 4级)             │\n│      当前日期                                                     │\n│    </system-reminder>                              ← api.ts:449  │\n│                                                                   │\n│  messages[1..]: 经过 5 层压缩管线的消息历史                        │\n│    1. applyToolResultBudget — 工具结果大小裁剪    ← query.ts:379  │\n│       (一次 shell 输出可能数千 token，此层按 tool 裁剪上限)        │\n│    2. snipCompactIfNeeded — 删最旧消息对          ← query.ts:403  │\n│       (对话前期的 tool_use/tool_result 配对被整对移除)             │\n│    3. microcompact — 单条截断 (>64MB 写磁盘)      ← query.ts:414  │\n│       (单条巨大的 cat/read 输出被截断或落盘)                       │\n│    4. contextCollapse — 旧工具结果折叠为摘要      ← query.ts:441  │\n│       (10 步前的 grep 结果折叠成一句话摘要)                        │\n│    5. autocompact — 全历史 API 摘要               ← query.ts:454  │\n│       (整个对话压缩成 9 段结构化总结)                               │\n│                                                                   │\n│  messages 间的 attachment (异步注入):                              │\n│    Memory 文件 (Sonnet sideQuery 选 5 个, 每个 ≤4KB)              │\n│    以 <system-reminder> 注入 tool_result 位置    ← query.ts:1600  │\n└───────────────────────────────────────────────────────────────────┘\n```\n\n### 3.2 Codex 的请求：扁平指令 + 线性追加\n\n`codex.rs:6257-6260` 构建 input，`build_prompt()` 组装 `Prompt`，最终序列化为 `ResponsesApiRequest`（`common.rs:155`）：\n\n```\n┌─ instructions 字段 ──────────────────────────────────────────────┐\n│                                                                   │\n│  一个扁平字符串, 来自 sess.get_base_instructions()                │\n│  内容: 角色定义 + \"keep going until completely resolved\" +        │\n│        apply_patch 格式说明 + coding guidelines                   │\n│                                         ← default.md:125         │\n│                                                                   │\n│  无分层、无 cache 断点、无动态/静态区分                            │\n│  整个 session 期间不变                                             │\n└───────────────────────────────────────────────────────────────────┘\n\n┌─ input 字段 ─────────────────────────────────────────────────────┐\n│                                                                   │\n│  input[0]: role=developer                                         │\n│    permissions instructions (sandbox 规则, escalation 协议)       │\n│                                                                   │\n│  input[1]: role=user                                              │\n│    AGENTS.md 内容, <INSTRUCTIONS> 标签包裹                        │\n│    带目录名前缀                      ← user_instructions.rs       │\n│                                                                   │\n│  input[2..]: ContextManager.items 的完整序列                       │\n│    user / assistant / function_call / function_call_output        │\n│                                      ← codex.rs:6257-6260        │\n│                                                                   │\n│  无 per-turn Memory 注入                                          │\n│  无 5 层压缩管线 (只有到 90% 触发的 autocompact)                  │\n│  无 <system-reminder> attachment                                  │\n│                                                                   │\n│  WebSocket 增量模式下:                                             │\n│    只发 delta items + previous_response_id   ← client.rs:920-957  │\n└───────────────────────────────────────────────────────────────────┘\n```\n\n**实际效果**：假设 agent 在第 3 步 `cat` 读取了 500 行日志。在 Claude Code 中，第四层管线会在后续迭代中将这个过时的输出折叠为一句摘要（\"读取了 server.log，500 行，含 3 处错误\"），模型在第 10 步只看到摘要。在 Codex 中，500 行原始输出保留在 items 中直到触发 compact。每条 shell 输出、每次文件读取都是 token——5 层管线的作用是让模型在后续步骤中只看到摘要而非原始全文[1]。\n\n### 3.3 迭代间：重新编排 vs 只追加\n\n同一个 turn 内部，两次连续 API 调用之间，context 的变化方式揭示了两种设计的核心分歧。\n\n<!-- SPLIT:Claude Code: 迭代 N → N+1|Codex: 迭代 N → N+1 -->\n\n```\nmessagesForQuery 发生以下变化:\n\n+ 追加迭代 N 的 assistant 消息 + tool_result\n↓\n重跑 5 层压缩管线:\n  snip 删掉更旧的消息\n  microcompact 截断过大的 tool_result\n  collapse 把旧工具输出折叠成摘要\n  autocompact 把整个历史压缩成总结\n↓\n重新组装 fullSystemPrompt:\n  MCP Instructions 可能变了\n  Git status 可能变了\n↓\n重新 prependUserContext:\n  CLAUDE.md 重新注入 messages[0]\n↓\n检查 Memory prefetch 结果:\n  完成 → 注入新的 memory 文件\n  未完成 → 跳过\n\n→ 每次迭代，context 都可能不同\n```\n\n```\ninput 发生以下变化:\n\n+ 追加迭代 N 的 response items\n+ drain pending_input (排队的用户消息)\n\ninstructions 不变\ntools 通常不变\n\nWebSocket 增量模式:\n  只发 delta + previous_response_id\n  网络传输 O(delta)\n\n\n→ 每次迭代，context 只是线性增长\n```\n\n<!-- END_SPLIT -->\n\n<details>\n<summary><strong>Memory 注入机制的对比</strong>（展开查看 Claude Code 实时召回 vs Codex 后台提取）</summary>\n\nClaude Code 和 Codex 都有 memory 系统，但触发时机和注入方式不同。Claude Code 由 harness 每轮主动筛选并注入；Codex 在后台批量提取，由模型在需要时自行读取：\n\n<!-- SPLIT:Claude Code: per-turn 实时召回|Codex: 后台批处理提取 (UnderDevelopment) -->\n\n```\n触发: 每个用户 turn 启动一次\n     (query.ts:297 \"Fired once per user turn\")\n\n链路: header manifest（文件头清单）+ Sonnet 筛选\n  1. 扫描 memory/*.md, 只读前 30 行 frontmatter\n     保留最新 200 个候选  ← memoryScan.ts:21\n  2. 拼成清单 → Sonnet sideQuery\n     返回最多 5 个文件名  ← findRelevantMemories.ts:18\n  3. 过滤已展示/正在使用的工具文档\n  4. 选中后才读正文, ≤4KB/个, 60KB/session\n\n开销: 每轮 1 次 Sonnet API (max_tokens:256)\n     与主模型并行, 不阻塞\n```\n\n```\n触发: session 启动时后台执行\n     (start.rs:13 start_memories_startup_task)\n\n链路: 两阶段后台批处理管线\n  Phase 1: gpt-5.4-mini 从历史 rollout 提取\n     并发 8, 产出 raw_memories.md\n                         ← memories/phase1.rs\n  Phase 2: gpt-5.3-codex 全局 consolidation\n     产出 memory_summary.md\n                         ← memories/phase2.rs\n\n状态: UnderDevelopment, 默认关闭\n     (features/lib.rs:670)\n注入: 模型需要时主动读取文件\n```\n\n<!-- END_SPLIT -->\n\n\n</details>\n\n### 3.4 沉默成本的两种解法\n\nClaude Code 的循环是**每轮重新编排**——5 层压缩管线重跑、Memory 动态注入、MCP 指令和 git status 实时更新，模型每轮看到的是经过裁剪的\"当前最优\"context 快照。Codex 的循环是**持续追加**——items 只增不减（直到 compact），instructions 不变，模型看到的是线性增长的执行记录。这一对比与《Comparative Harness Notes》第 3 章的分析一致 [2]。\n\n两者解决的是同一个问题——**context 的沉默成本** [1]：每次 API 调用都要重新发送 system prompt + 项目指令 + 历史消息，这是固定开销。Claude Code 在 prompt 构建层面通过渐进裁剪降低这个成本；Codex 在传输协议层面通过 WebSocket 增量模式（`previous_response_id` + delta items）避免重传。层面不同，目标相同。\n\n### 3.5 步数增长后的代价分化\n\n这两种 context 管理方式对长 turn 的影响是**双面的**，不能简单地说哪个更好。\n\n**前 10 步**：两者差异不大。context 还没满，Claude Code 的 5 层管线基本是空转开销，Codex 的简单追加反而更高效。\n\n**10-25 步**：分歧开始出现。Claude Code 的管线开始发挥作用——裁剪旧信息、注入新 memory、折叠过时的工具输出。模型看到的始终是一个\"精炼过的\"context。Codex 的 items 持续增长，早期的 shell 输出、过时的文件内容、中间结果全部堆积，context 密度开始稀释。\n\n**25+ 步**：两种代价同时显现。\n\nClaude Code 这边，每轮重新编排意味着更多的失败点：\n\n```\n5 层管线的每一层都是潜在的摩擦源:\n  autocompact 连续失败 3 次 → circuit breaker → 停\n  撞 blocking limit (context window - 3K) → 强制 return\n  max_output_tokens 8K cap → 截断恢复最多 3 次 → 可能丢失思路\n  MCP 断开 → system prompt 变化 → cache key 变化 → 全局缓存失效\n```\n\nCodex 这边，没有任何步骤会导致 turn 被 harness 终止——但 context 质量在下降：\n\n```\nitems 线性膨胀，无主动裁剪:\n  模型的注意力可能被大量旧信息分散\n  compact 触发时是一次性全量压缩（非渐进式）\n  压缩前后的信息断层可能比 Claude 的渐进裁剪更剧烈\n```\n\n用一张表总结：\n\n| 阶段 | Claude Code | Codex |\n|------|-------------|-------|\n| 前期 (1-10 步) | 管线空转，略有开销 | 简单追加，效率更高 |\n| 中期 (10-25 步) | 管线发挥作用，context 密度保持高 | items 膨胀，信噪比下降 |\n| 后期 (25+ 步) | 管线有概率故障 → turn 可能被终止 | 核心循环中未发现显式终止条件，但 context 密度下降 |\n| compact 方式 | 渐进式 (snip→micro→collapse→auto) | 一次性全量压缩 |\n\n这两种设计优化的**目标函数不同**：\n\n- Claude Code 优化的是**每一步的 context 质量** — 模型在任何一步都看到当前最优的上下文，代价是 harness 复杂度高、有终止风险\n- Codex 优化的是**turn 的持续性** — 核心循环中未发现显式的 step/tool-call 上限，loop 设计显著偏向继续执行，代价是后期 context 质量逐步退化\n\n两者不是\"谁更好\"的关系，而是在\"每步质量\"和\"持续运行\"之间做了不同的取舍。一个 30 步任务在 Claude Code 上可能在第 20 步被终止但前 20 步质量很高；在 Codex 上可能跑完 30 步但后 10 步的效率已经下降。\n\n这也解释了为什么 understand-anything 选择在 Claude Code 上用**流水线+子代理模式**而非单 turn 长跑——它通过子代理把每段工作控制在管线有效区间内（每个子代理只看 20-30 个文件），既享受了 Claude 的 per-step 高质量 context，又绕过了长 turn 的终止风险。\n\n---\n\n\n以上 3.1-3.5 分析了 context 构建层面的差异。以下 3.6-3.7 分析另外两个维度：prompt 指令和用户输入处理。\n\n### 3.6 Prompt 与 Harness：谁决定了模型停不停\n\n循环骨架一样（有 tool_call 就 continue），但 Codex 在 Prompt 指令、输出限制、Compact 策略三个层面都显著偏向持续执行。\n\n**差异 A：Prompt 指令方向完全相反**\n\n<!-- SPLIT:Claude Code Prompt (prompts.ts:258)|Codex Prompt (default.md:125) -->\n\n```\n// prompts.ts:258\n\"for actions that are hard to reverse,\n affect shared systems beyond your local\n environment, or could otherwise be risky\n or destructive, check with the user\n before proceeding... by default\n transparently communicate the action\n and ask for confirmation.\"\n\n// prompts.ts:418\n\"Go straight to the point.\n Do not overdo it. Be extra concise.\"\n```\n\n```\n// default.md:125\n\"Please keep going until the query\n is completely resolved, before ending\n your turn and yielding back to the user.\n Only terminate your turn when you are\n sure that the problem is solved.\"\n\n// gpt_5_1_prompt.md:30\n\"Persist until the task is fully handled\n end-to-end within the current turn\n whenever feasible: do not stop at\n analysis or partial fixes.\"\n```\n\n<!-- END_SPLIT -->\n\n| | Claude Code | Codex |\n|--|-------------|-------|\n| 核心指令 | \"check with the user before proceeding\" | \"keep going until completely resolved\" |\n| 遇到不确定 | \"ask for confirmation\" | \"Autonomously resolve\" |\n| 输出风格 | \"Do not overdo it. Be extra concise.\" | 无限制 |\n\n这不是随意的措辞差异。Codex 运行在 sandbox 中（所有操作可回滚），所以可以放心说\"自主解决\"。Claude Code 不假设 sandbox，所以必须谨慎。即使使用 `--dangerously-skip-permissions` 跳过 harness 层的工具权限确认，**prompt 层的行为指令不变**——`getActionsSection()`（`prompts.ts:255`）无条件注入。但 prompt 原文也提供了覆盖路径（`prompts.ts:258`）：\n\n> \"This default can be changed by user instructions - if explicitly asked to operate more autonomously, then you may proceed without confirmation, but still attend to the risks and consequences when taking actions.\"\n\n即用户可在 CLAUDE.md 中写入类似 Codex 的自主执行指令（如\"完成整个任务链路再汇报，中间不要停下来确认\"），覆盖默认的谨慎确认行为。\n\n**差异 B：max_output_tokens 限制**\n\n```typescript\n// Claude Code — context.ts:23-24\nexport const CAPPED_DEFAULT_MAX_TOKENS = 8_000   // 默认单次输出上限\nexport const ESCALATED_MAX_TOKENS = 64_000        // 截断后升级到 64K\n\n// Claude Code — query.ts:164\nconst MAX_OUTPUT_TOKENS_RECOVERY_LIMIT = 3        // 最多恢复 3 次\n\n// 恢复逻辑 — query.ts:1223-1228\nif (maxOutputTokensRecoveryCount < MAX_OUTPUT_TOKENS_RECOVERY_LIMIT) {\n  // 注入 \"Output token limit hit. Resume directly\" 让模型继续\n  // 但最多 3 次，之后放弃\n}\n```\n\nCodex 没有客户端侧的 `max_output_tokens` cap。模型单次输出不受客户端限制。\n\n8K 上限是为了优化 API slot 利用率（99% 的请求输出 < 5K tokens），但 1% 的长输出场景会被截断，截断+恢复可能导致模型\"丢失思路\"。\n\n**差异 C：Compact 策略**\n\n<!-- SPLIT:Claude Code — autoCompact.ts|Codex — codex.rs:6312 -->\n\n```typescript\n// Claude Code — autoCompact.ts\n// compact 连续失败 3 次\n//   → circuit breaker 触发\n//   → 停止 compact\n// blocking limit (context window - 3K)\n//   → 直接终止循环\n```\n\n```rust\n// Codex — codex.rs:6312-6328\nif token_limit_reached && needs_follow_up {\n    run_auto_compact(...).await;\n    client_session.reset_websocket_session();\n    continue;  // 无条件继续\n}\n// 无 circuit breaker\n// compact 失败 → 逐条删最旧条目后重试\n```\n\n<!-- END_SPLIT -->\n\n| | Claude Code | Codex |\n|--|-------------|-------|\n| Compact 后 | `continue`（但有 circuit breaker） | `continue`（无条件继续） |\n| Compact 失败 | 3 次后放弃 | 删最旧条目重试（`compact.rs:215`） |\n| 紧急制动 | blocking limit → 直接 `return` | 无 |\n| 服务端 compact | N/A | 走 `/responses/compact` |\n\n---\n\n### 3.7 用户输入：队列排队 vs 新建循环\n\n在 Codex 中，一种常见的延长执行方式是预先排队多条\"请继续\"消息：\n\n![Codex 中排队发送\"请继续\"的实际操作](assets/codex-please-continue.png)\n\n这些消息不会打断当前执行，而是在 pending_input 队列中等待当前 turn 完成后依次消费。同样的操作在 Claude Code 中会启动新的 query 循环。这一差异源于两种不同的用户输入处理模型。\n\n<!-- SPLIT:Claude Code: 无等价 steer (query.ts:832)|Codex: turn/steer 队列机制 (codex.rs:4148) -->\n\n```typescript\n// query.ts:832 — 唯一的继续信号\nif (msgToolUseBlocks.length > 0) {\n  needsFollowUp = true\n}\n// 只看模型是否返回了 tool_use\n// 没有 || has_pending_input\n// 新用户消息 → 新 query() 调用\n\n\n```\n\n```rust\n// codex.rs:4148 — Session.steer_input()\nfn steer_input(&self, input, expected_turn_id) {\n    // 1. 检查有活跃 turn\n    // 2. 检查 turn_id 匹配\n    // 3. 入队，不打断\n    turn_state.push_pending_input(input);\n}\n\n// codex.rs:6293 — 循环内判定\nlet needs_follow_up =\n    model_needs_follow_up\n    || has_pending_input;\n// 队列有消息 → 强制继续\n```\n\n<!-- END_SPLIT -->\n\n**\"请继续\"在两边的完整生命周期：**\n\n<!-- SPLIT:Claude Code: 新消息 → 新 query 循环|Codex: 入队 → 等完成 → 消费 -->\n\n```\n用户发 \"请继续\"\n  → 新的 user message\n  → 进入下一个 query() 调用\n  → 当前 turn 正常完成\n  → 新输入改变执行轨迹\n  → 模型在新上下文中重新规划\n  → 而非在原轨迹上延续\n\n```\n\n```\n用户发 \"请继续\"\n  → turn/steer\n  → push_pending_input()    [入队]\n  → 当前 tool call 正常完成\n  → needs_follow_up =\n      false || true(队列非空) = true\n  → continue\n  → drain \"请继续\" → 注入历史\n  → 再次调模型 → 继续工作\n```\n\n<!-- END_SPLIT -->\n\n> Claude Code 并非\"立即中断当前工具执行\"——当前 turn 的 tool call 链会正常完成。但新消息启动的是一个全新的 query 循环，模型在新上下文中重新决策，而非在原有 turn 内追加后继续。\n\nturn/steer 模式的核心洞察：**让用户消息排队等当前 step 完成后再处理**，而不是立即注入。这是一个通用的 Agent 设计模式。\n\n---\n\n## 四、三种长程运行模式\n\n第三节末尾提到 understand-anything 选择流水线模式绕过了 Claude Code 的长 turn 终止风险。实际上，社区已经发展出三种不同的长程执行策略。\n\n### 4.1 Prompt 驱动\n\n代表：[Codex CLI](https://github.com/openai/codex)（`codex-rs/protocol/src/prompts/base_instructions/default.md:125`）\n\n```\n核心机制：\n  prompt = \"keep going until completely resolved\"\n  + 零步数限制（代码库中无 max_steps/max_tool_calls）\n  + compact → continue（不停）\n  + pending_input 队列强制延续\n  + Stop Hook 可拒绝停止并注入 continuation_prompt\n\n适用场景：单个大任务（重构、长链路调试、代码迁移）\n人工介入：近零（除非 sandbox 权限不足需要 escalation）\n单 turn 续航：核心循环中未发现显式 step 上限，compact 有效即可持续执行\n风险：模型可能在错误方向上走很远才被发现\n```\n\n### 4.2 流水线 + 子代理扇出\n\n代表：[understand-anything](https://github.com/Lum1104/Understand-Anything)（Claude Code plugin）。作为第三方 plugin 的典型案例，其设计模式可推广到任何需要在 Claude Code 上执行长程结构化任务的场景。\n\n```\n核心机制：\n  8 Phase 流水线，每个 Phase 的输出是磁盘文件：\n    Phase 1 → intermediate/scan-result.json\n    Phase 2 → intermediate/batch-0.json ... batch-N.json\n    Phase 3 → intermediate/assemble-review.json\n    Phase 4 → intermediate/layers.json\n    ...\n\n  关键设计：\n  1. 子代理独立 context — file-analyzer 一次只看 20-30 文件\n  2. 最多 5 个子代理并行（扇出）\n  3. 确定性脚本做合并 — merge-batch-graphs.py（不用 LLM）\n  4. SKILL.md 是连续指令序列，无\"要继续吗？\"检查点\n  5. 错误容忍 — 失败重试一次，再失败跳过继续\n\n适用场景：结构化批量分析（代码库分析、文档生成、数据处理）\n人工介入：仅初始调用（> 100 文件时有确认 gate）\n单 turn 续航：主 agent 每 Phase 只做编排，子 agent 做重活\n                每个子 agent 是短 turn，但流水线可持续 30+ 分钟\n风险：Phase 间的数据传递依赖 schema 约定，schema 变更需同步更新所有 agent\n```\n\n这个模式在 token 管理上有一个重要的设计：**子代理的结果通过磁盘文件传递，而非通过 context 回灌主 agent**。子代理把 `batch-N.json` 写到磁盘，主 agent 只读取它需要的部分（如节点 ID 列表），不会把子代理的完整分析过程塞进自己的 context。这与社区实践经验一致——批量 subagent 的结果应通过文件交互而非 token 回灌 [1]。\n\n为什么这个模式能在 Claude Code 上跑很久（即使 Claude 的 prompt 说\"谨慎确认\"）？\n\n因为 SKILL.md **本身就是一份极其详细的指令**——模型不需要\"思考该怎么做\"，只需要执行。630 行的精确步骤消除了模型的不确定性，也就消除了它\"停下来确认\"的倾向。\n\n### 4.3 多 Session 持久体\n\n代表：[OpenClaw](https://github.com/openclaw/openclaw)（开源个人 AI 代理平台）\n\n```\n核心机制：\n  Gateway 进程常驻 (port:18789, KeepAlive)\n    ↓\n  收到消息 (飞书/Discord/Slack/CLI)\n    ↓\n  启动 Session → 读 AGENTS.md → 读 SOUL.md → 读 memory/\n    ↓\n  执行任务 → 写回 memory/YYYY-MM-DD.md\n    ↓\n  Session 结束\n    ↓\n  Heartbeat 定时唤醒 / Cron 精确调度\n    ↓\n  新 Session → 读 memory → 检查邮件/日历/...\n\n  关键设计：\n  1. Sub-Agent Spawn — 后台子 agent（嵌套 5 层、并发 8 个）\n  2. Auto-Compaction 前 silent memory flush — 先把重要信息写磁盘再压缩\n  3. Lobster Workflow Engine — 确定性工作流，带可恢复 approval gate\n  4. ACP Agents — 桥接 Claude Code/Codex 作为外部 harness\n\n适用场景：持续运行的 AI 助理（跨天跨周的陪伴式 Agent）\n人工介入：被动响应（Agent 主动检查邮件/日历后通知，用户按需回复）\n单 turn 续航：不追求单 turn 跑久，靠无限短 session 构成连续体验\n风险：memory 文件会无限增长，需要定期整理\n```\n\n### 4.4 权衡总览\n\n| 维度 | Prompt 驱动 | 流水线+子代理 | 多 Session 持久体 |\n|------|-------------|---------------|-------------------|\n| 单 turn 续航 | 未发现显式上限 | 主 agent 短，子 agent 短 | 不追求 |\n| 人工介入 | 近零 | 近零 | 被动 |\n| 状态持久化 | context + compact | 磁盘文件 | 文件 + SQLite |\n| Context 压力 | 高（单 turn 积累） | 低（子 agent 分散） | 低（每 session 独立） |\n| 错误恢复 | compact 降级 | Phase 跳过 | session 重启 |\n| 适用平台 | Codex（prompt 鼓励不停） | Claude Code（SKILL.md 消除不确定性） | 任意（平台无关） |\n\n---\n\n\n## 五、Takeaway\n\n1. **续航差异和单步质量可能是同一个 context 策略的两面** — Claude Code 每轮重新编排 context（5 层管线 + Memory 预取 + 动态 system prompt），其机制有利于维持单步质量但引入终止风险；Codex 线性追加 items，摩擦少但后期 context 稀释。这是源码层面可观测到的机制差异，体感上的因果关系还需要更多维度的验证。\n\n2. **Codex 的持续执行来自三层协同** — Prompt 指令（\"keep going\"）+ 核心循环中未发现显式 step 上限 + Compact 无 circuit breaker，三者缺一不可。\n\n3. **自主性和可控性可能是正交的** — Codex 感觉\"不可控\"更可能是 prompt 默认（\"keep going\"），而非架构限制。实际上 Codex 在精确回溯上有更多手段：任意位置 fork、rollback 不受 compact 限制、turn/steer 排队不打断。Claude Code 的 `/rewind` 受限于 compact 边界。Prompt 控制自主性，架构控制可控性。\n\n4. **长时间运行有三种路径** — Prompt 驱动（单 turn 跑到底）、流水线+子代理（磁盘持久化中间状态）、多 Session 持久体（无限 session 序列）。选择取决于任务结构和平台约束。\n\n---\n\n## 六、开放问题：从\"跑得久\"到\"跑得好\"\n\n前五节聚焦\"续航\"——怎么让 Agent 跑更久。但跑得久不等于跑得好。以下是本文未能充分考察、留待后续探索的方向。\n\n### 6.1 协作模式与在场价值\n\n回顾笔者的使用数据：交给 Codex 的无人值守任务（286 min）和用 Claude Code 高频交互的任务（211 min），一个可能的区分维度是用户在场是否能增加价值（复杂度等其他因素未被控制）。目标明确、路径确定的任务适合委托；需要品味判断、方向调整的任务适合协作。\n\n这引出一个假设（尚未验证）：用户对\"在场价值\"的判断能力，可能比工具选择本身更影响效率。过度委托和过度介入都是这个判断不够清晰的后果。如果 harness 能辅助分析任务指令的目标精确度、路径确定性、品味判断需求，动态调整 Agent 的自主程度，或许能减少这类浪费。这方面尚无成熟方案。\n\n### 6.2 效果保证：自我进化的 Agent\n\n本文分析的四种框架都没有解决一个问题：**Agent 跑了很久，但跑偏了怎么办？** 续航越强，这个风险越大。\n\n一种值得关注的方向是 [Hermes Agent](https://github.com/NousResearch/hermes-agent) [8] 的闭环学习系统（详见 `hermes-agent-learning-loop.md`）：Agent 完成任务后，后台审查线程判断是否有可复用的方法并自动创建 skill；使用 skill 时发现缺陷可立即 patch；执行记录被压缩为 RL 训练数据用于改进模型。这是从\"跑得久\"到\"每次跑完都变得更好\"的架构演进。但自我改进的 Agent 如何保证改进方向的正确性，仍是开放问题。\n\n### 6.3 定制 Harness\n\n理解了 prompt 控制自主性、架构控制可控性、context 策略决定续航/质量取舍之后，用户可以基于开源 harness 组装自己的控制策略 [7]。这比选择现有产品更灵活，也更需要对 Agent 机制的深入理解。\n\n## 引用\n\n- [1] 黄哲威等, [OpenClaw 如何系统性节省 Token](https://www.zhihu.com/question/2011944622507700619/answer/2014141275079738495), 知乎, 2026\n- [2] agentway.dev, [Comparative Harness Notes 第 3 章: Query Loop 对照 Thread、Rollout 与 State](https://harness-books.agentway.dev/book2-comparing/chapter-03-loop-thread-and-rollout.html), 2026\n- [3] [Claude Code](https://github.com/anthropics/claude-code) 2.1.88 源码\n- [4] [Codex CLI (codex-rs)](https://github.com/openai/codex) 源码\n- [5] [understand-anything](https://github.com/Lum1104/Understand-Anything) Claude Code plugin\n- [6] [OpenClaw](https://github.com/openclaw/openclaw) 个人 AI 代理平台\n- [7] yage.ai, [关于 OpenClaw](https://yage.ai/openclaw.html) — \"工具会过气，对工具本质的理解不会\"\n- [8] [Hermes Agent](https://github.com/NousResearch/hermes-agent), Nous Research — 闭环学习系统（skill 自创建 + trajectory → RL）\n\n---\n\n*Claude Code 侧引用（`file.ts:line`）基于本地源码 [3]；Codex 侧引用（`file.rs:line`）基于本地源码 [4]；第三方引用 [5][6] 基于本地安装版本，未做上游版本锁定。*\n";

html = html.replace(/\[可借鉴\]/g, '<span class="tag tag-reuse">可借鉴</span>');
html = html.replace(/\[陷阱\]/g, '<span class="tag tag-tradeoff">陷阱</span>');

// Post-process: convert [1], [2] etc. to clickable footnote links
html = html.replace(/\[(\d+)\]/g, function(match, num) {
  // Don't convert if inside an <a> tag or markdown link (already rendered)
  return '<a href="#ref-' + num + '" class="ref-link">[' + num + ']</a>';
});

document.getElementById('content').innerHTML = html;

// Add ids to reference list items so footnote links can jump to them
(function() {
  const content = document.getElementById('content');
  const refSection = Array.from(content.querySelectorAll('h2')).find(h => h.textContent.trim() === '引用');
  if (!refSection) return;
  let el = refSection.nextElementSibling;
  while (el) {
    if (el.tagName === 'UL' || el.tagName === 'OL') {
      el.querySelectorAll('li').forEach(li => {
        const m = li.textContent.match(/^\[(\d+)\]/);
        if (m) li.id = 'ref-' + m[1];
      });
      break;
    }
    if (el.tagName === 'H2') break;
    el = el.nextElementSibling;
  }
})();

// Add IDs to headings and build nav
const headings = document.querySelectorAll('#content h2, #content h3');
const nav = document.getElementById('nav');
headings.forEach((h, i) => {
  h.id = 'section-' + i;
  const a = document.createElement('a');
  a.className = 'nav-item';
  a.href = '#section-' + i;
  const num = document.createElement('span');
  num.className = 'nav-num';
  const text = h.textContent;
  const m = text.match(/^([一二三四五六七八九十]+)[、.．]/) || text.match(/^(\d+\.\d+)\s/) || text.match(/^模式\s*(\d+)/);
  num.textContent = m ? m[1] : '·';
  a.appendChild(num);
  const label = text.replace(/^[一二三四五六七八九十]+[、.．]\s*/, '').replace(/^\d+\.\d+\s*/, '').replace(/^模式\s*\d+[：:]\s*/, '');
  a.appendChild(document.createTextNode(label.length > 20 ? label.slice(0,20)+'...' : label));
  if (h.tagName === 'H3') { a.style.paddingLeft = '36px'; num.style.fontSize = '10px'; num.style.width = '18px'; num.style.height = '18px'; }
  nav.appendChild(a);
});

// Scroll spy
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      const link = nav.querySelector('a[href="#'+e.target.id+'"]');
      if (link) link.classList.add('active');
    }
  });
}, { rootMargin: '-20% 0px -70% 0px' });
headings.forEach(h => obs.observe(h));

// Highlight code blocks
hljs.highlightAll();

// Post-process: find <!-- SPLIT:Left|Right --> markers and arrange
// the next two <pre> blocks side-by-side with labels
(function() {
  const content = document.getElementById('content');
  // HTML comments become comment nodes after marked.parse
  // But marked strips them. So we look for the raw text pattern in innerHTML.
  const splitRe = /<!--\s*SPLIT:(.*?)\|(.*?)\s*-->/g;
  let match;
  const htmlStr = content.innerHTML;
  const splits = [];
  while ((match = splitRe.exec(htmlStr)) !== null) {
    splits.push({ full: match[0], left: match[1], right: match[2] });
  }
  // Also find END_SPLIT
  const endRe = /<!--\s*END_SPLIT\s*-->/g;

  if (splits.length === 0) return;

  // For each SPLIT marker, find the two consecutive <pre> blocks after it
  // and wrap them in a side-by-side grid
  splits.forEach(sp => {
    // Insert a placeholder div that we can find in the DOM
    const placeholder = '<div class="split-marker" data-left="'+sp.left+'" data-right="'+sp.right+'"></div>';
    content.innerHTML = content.innerHTML.replace(sp.full, placeholder);
  });
  // Remove END_SPLIT markers
  content.innerHTML = content.innerHTML.replace(endRe, '');

  // Now find each .split-marker and rearrange DOM
  content.querySelectorAll('.split-marker').forEach(marker => {
    const leftLabel = marker.dataset.left;
    const rightLabel = marker.dataset.right;

    // Find the next two <pre> elements after the marker
    let el = marker.nextElementSibling;
    let pres = [];
    while (el && pres.length < 2) {
      if (el.tagName === 'PRE') pres.push(el);
      else if (el.tagName === 'H2' || el.tagName === 'H3') break; // stop at next heading
      el = el.nextElementSibling;
    }

    if (pres.length < 2) return;

    // Build side-by-side container
    const grid = document.createElement('div');
    grid.className = 'side-by-side';

    const leftDiv = document.createElement('div');
    const rightDiv = document.createElement('div');

    const ll = document.createElement('div');
    ll.className = 'side-label claude';
    ll.textContent = leftLabel;
    const rl = document.createElement('div');
    rl.className = 'side-label codex';
    rl.textContent = rightLabel;

    leftDiv.appendChild(ll);
    leftDiv.appendChild(pres[0]);
    rightDiv.appendChild(rl);
    rightDiv.appendChild(pres[1]);

    grid.appendChild(leftDiv);
    grid.appendChild(rightDiv);

    marker.parentNode.replaceChild(grid, marker);
  });
})();
</script>
</body>
